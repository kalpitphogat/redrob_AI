bonus in relevant_fields.items():\n            if f in field:\n                score += bonus\n                break\n\n        # Degree level\n        degree = edu.get(\"degree\", \"\").lower()\n        if \"ph.d\" in degree or \"phd\" in degree:\n            score += 0.15\n        elif \"m.tech\" in degree or \"m.s.\" in degree or \"m.e.\" in degree or \"m.sc\" in degree:\n            score += 0.10\n        elif \"b.tech\" in degree or \"b.e.\" in degree or \"b.sc\" in degree:\n            score += 0.05\n\n        best_score = max(best_score, score)\n\n    return min(1.0, best_score)\n\n\n# ============================================================================\n# Combined scorer\n# ============================================================================\n\ndef compute_base_score(candidate: dict) -> tuple[float, dict]:\n    \"\"\"\n    Compute the combined base score for a candidate across all dimensions.\n\n    Returns:\n        Tuple of (score, breakdown) where score is 0.0-1.0 and\n        breakdown is a dict of dimension name \u2192 individual score.\n    \"\"\"\n    breakdown = {\n        \"title_career\": score_title_career(candidate),\n        \"skills_match\": score_skills(candidate),\n        \"career_description\": score_career_descriptions(candidate),\n        \"experience_fit\": score_experience(candidate),\n        \"location\": score_location(candidate),\n        \"education\": score_education(candidate),\n    }\n\n    # Weighted sum\n    total = sum(\n        breakdown[dim] * WEIGHTS[dim]\n        for dim in breakdown\n    )\n\n    return total, breakdown\n", "behavioral.py": "\"\"\"\nbehavioral.py \u2014 Stage 4: Behavioral signal modifier.\n\nApplies a multiplicative modifier to the base score based on\nthe candidate's platform activity and engagement signals.\n\nThe JD explicitly states: \"a perfect-on-paper candidate who hasn't\nlogged in for 6 months and has a 5% recruiter response rate is,\nfor hiring purposes, not actually available.\"\n\"\"\"\n\nfrom datetime import datetime, date\nfrom config import (\n    REFERENCE_DATE,\n    ACTIVE_VERY_RECENT_DAYS,\n    ACTIVE_RECENT_DAYS,\n    ACTIVE_STALE_DAYS,\n    RESPONSE_RATE_EXCELLENT,\n    RESPONSE_RATE_GOOD,\n    RESPONSE_RATE_POOR,\n    RESPONSE_TIME_FAST,\n    RESPONSE_TIME_OK,\n    RESPONSE_TIME_SLOW,\n    NOTICE_IDEAL,\n    NOTICE_ACCEPTABLE,\n    NOTICE_LONG,\n    NOTICE_VERY_LONG,\n)\n\n\ndef _recency_modifier(last_active_str: str) -> float:\n    \"\"\"\n    Score based on how recently the candidate was active.\n    JD says inactive candidates are effectively unavailable.\n    \"\"\"\n    if not last_active_str:\n        return 0.7\n\n    try:\n        last_active = datetime.strptime(last_active_str, \"%Y-%m-%d\").date()\n        days_ago = (REFERENCE_DATE - last_active).days\n\n        if days_ago < 0:\n            # Active \"in the future\" \u2014 treat as very recent\n            return 1.1\n        elif days_ago <= ACTIVE_VERY_RECENT_DAYS:\n            return 1.10\n        elif days_ago <= ACTIVE_RECENT_DAYS:\n            return 1.0\n        elif days_ago <= ACTIVE_STALE_DAYS:\n            return 0.80\n        else:\n            return 0.55  # Inactive 6+ months \u2014 significant penalty\n    except (ValueError, TypeError):\n        return 0.7\n\n\ndef _open_to_work_modifier(open_flag: bool) -> float:\n    \"\"\"Candidates marked as open to work are more likely to engage.\"\"\"\n    return 1.08 if open_flag else 0.90\n\n\ndef _response_rate_modifier(rate: float) -> float:\n    \"\"\"\n    Based on recruiter_response_rate.\n    Low response rate = candidate likely unresponsive.\n    \"\"\"\n    if rate >= RESPONSE_RATE_EXCELLENT:\n        return 1.12\n    elif rate >= RESPONSE_RATE_GOOD:\n        return 1.0\n    elif rate >= RESPONSE_RATE_POOR:\n        return 0.82\n    else:\n        return 0.60  # <20% response rate = almost unreachable\n\n\ndef _response_time_modifier(hours: float) -> float:\n    \"\"\"\n    Based on avg_response_time_hours.\n    Fast responders are more hirable.\n    \"\"\"\n    if hours <= RESPONSE_TIME_FAST:\n        return 1.08\n    elif hours <= RESPONSE_TIME_OK:\n        return 1.0\n    elif hours <= RESPONSE_TIME_SLOW:\n        return 0.90\n    else:\n        return 0.78\n\n\ndef _notice_period_modifier(days: int) -> float:\n    \"\"\"\n    JD says: \"sub-30-day notice ideal, can buy out up to 30 days,\n    30+ day notice candidates still in scope but bar gets higher.\"\n    \"\"\"\n    if days <= NOTICE_IDEAL:\n        return 1.10\n    elif days <= NOTICE_ACCEPTABLE:\n        return 1.0\n    elif days <= NOTICE_LONG:\n        return 0.90\n    elif days <= NOTICE_VERY_LONG:\n        return 0.80\n    else:\n        return 0.70\n\n\ndef _interview_completion_modifier(rate: float) -> float:\n    \"\"\"\n    Candidates who complete interviews are more serious.\n    Low completion rate = flight risk / not serious.\n    \"\"\"\n    if rate >= 0.8:\n        return 1.05\n    elif rate >= 0.5:\n        return 0.95\n    else:\n        return 0.78\n\n\ndef _profile_completeness_modifier(score: float) -> float:\n    \"\"\"\n    Higher profile completeness suggests a more engaged candidate.\n    Low completeness = less invested in job search.\n    \"\"\"\n    if score >= 80:\n        return 1.05\n    elif score >= 50:\n        return 1.0\n    elif score >= 30:\n        return 0.92\n    else:\n        return 0.85\n\n\ndef _github_modifier(score: float) -> float:\n    \"\"\"\n    GitHub activity is a positive signal for engineering roles.\n    -1 means no GitHub linked (neutral, not penalty).\n    \"\"\"\n    if score < 0:\n        return 1.0  # No GitHub = neutral\n    elif score >= 70:\n        return 1.12\n    elif score >= 40:\n        return 1.06\n    elif score >= 10:\n        return 1.02\n    else:\n        return 1.0\n\n\ndef _verification_modifier(verified_email: bool, verified_phone: bool,\n                           linkedin: bool) -> float:\n    \"\"\"\n    Verified accounts are more trustworthy.\n    Unverified on everything = slight concern.\n    \"\"\"\n    mod = 1.0\n    if verified_email and verified_phone:\n        mod *= 1.03\n    elif not verified_email and not verified_phone:\n        mod *= 0.90\n\n    if linkedin:\n        mod *= 1.02\n\n    return mod\n\n\ndef _work_mode_modifier(preferred_mode: str) -> float:\n    \"\"\"\n    JD is hybrid (flexible cadence). Remote-only may be a mismatch.\n    \"\"\"\n    mode = preferred_mode.lower() if preferred_mode else \"\"\n    if mode in (\"hybrid\", \"flexible\"):\n        return 1.02\n    elif mode == \"onsite\":\n        return 1.0\n    elif mode == \"remote\":\n        return 0.95\n    else:\n        return 1.0\n\n\ndef _saved_by_recruiters_modifier(count: int) -> float:\n    \"\"\"\n    Being saved by recruiters indicates market desirability.\n    \"\"\"\n    if count >= 10:\n        return 1.06\n    elif count >= 5:\n        return 1.03\n    elif count >= 1:\n        return 1.0\n    else:\n        return 0.97\n\n\ndef compute_behavioral_modifier(candidate: dict) -> tuple[float, dict]:\n    \"\"\"\n    Compute the multiplicative behavioral modifier for a candidate.\n\n    The modifier adjusts the base content-match score up or down\n    based on the candidate's platform engagement and availability signals.\n\n    Returns:\n        Tuple of (modifier, breakdown_dict) where modifier is clamped\n        to [0.3, 1.3] and breakdown_dict shows each component.\n    \"\"\"\n    signals = candidate.get(\"redrob_signals\", {})\n\n    components = {\n        \"recency\": _recency_modifier(signals.get(\"last_active_date\", \"\")),\n        \"open_to_work\": _open_to_work_modifier(signals.get(\"open_to_work_flag\", False)),\n        \"response_rate\": _response_rate_modifier(signals.get(\"recruiter_response_rate\", 0.5)),\n        \"response_time\": _response_time_modifier(signals.get(\"avg_response_time_hours\", 72)),\n        \"notice_period\": _notice_period_modifier(signals.get(\"notice_period_days\", 60)),\n        \"interview_completion\": _interview_completion_modifier(\n            signals.get(\"interview_completion_rate\", 0.5)\n        ),\n        \"profile_completeness\": _profile_completeness_modifier(\n            signals.get(\"profile_completeness_score\", 50)\n        ),\n        \"github\": _github_modifier(signals.get(\"github_activity_score\", -1)),\n        \"verification\": _verification_modifier(\n            signals.get(\"verified_email\", False),\n            signals.get(\"verified_phone\", False),\n            signals.get(\"linkedin_connected\", False),\n        ),\n        \"work_mode\": _work_mode_modifier(signals.get(\"preferred_work_mode\", \"\")),\n        \"recruiter_saves\": _saved_by_recruiters_modifier(\n            signals.get(\"saved_by_recruiters_30d\", 0)\n        ),\n    }\n\n    # Multiply all modifiers together\n    modifier = 1.0\n    for value in components.values():\n        modifier *= value\n\n    # Clamp to reasonable range\n    modifier = max(0.3, min(1.3, modifier))\n\n    return modifier, components\n", "reasoning.py": "\"\"\"\nreasoning.py \u2014 Stage 6: Generate specific, honest per-candidate reasoning.\n\nEach reasoning must:\n- Reference specific facts from the candidate's profile\n- Connect to JD requirements\n- Acknowledge concerns honestly\n- Vary substantively across candidates (NOT templated)\n- Match tone to rank (top 10 = confident, bottom 20 = hedged)\n\nThis is evaluated at Stage 4 by sampling 10 random rows.\nHallucination, templates, or rank-tone mismatch are penalized.\n\"\"\"\n\nfrom datetime import datetime\nfrom config import (\n    CONSULTING_FIRMS,\n    MUST_HAVE_SKILLS,\n    STRONG_WANT_SKILLS,\n    REFERENCE_DATE,\n)\n\n\ndef _get_matching_skill_names(candidate: dict, category_set: set) -> list[str]:\n    \"\"\"Get skill names that match a given category set.\"\"\"\n    skills = candidate.get(\"skills\", [])\n    matches = []\n    for skill in skills:\n        name = skill.get(\"name\", \"\")\n        name_lower = name.lower().strip()\n        for cat_skill in category_set:\n            if cat_skill in name_lower or name_lower in cat_skill:\n                matches.append(name)\n                break\n    return matches\n\n\ndef _get_career_highlights(candidate: dict) -> list[str]:\n    \"\"\"Extract notable career facts for reasoning.\"\"\"\n    highlights = []\n    career = candidate.get(\"career_history\", [])\n    profile = candidate.get(\"profile\", {})\n\n    current_company = profile.get(\"current_company\", \"\")\n    current_title = profile.get(\"current_title\", \"\")\n    industry = profile.get(\"current_industry\", \"\")\n\n    # Check if at a consulting firm\n    is_consulting = any(\n        cf in current_company.lower() for cf in CONSULTING_FIRMS\n    )\n\n    # Count product-company roles\n    product_roles = 0\n    for role in career:\n        comp = role.get(\"company\", \"\").lower()\n        industry_r = role.get(\"industry\", \"\").lower()\n        if industry_r in (\"software\", \"technology\", \"internet\", \"saas\"):\n            product_roles += 1\n\n    if product_roles >= 2:\n        highlights.append(\"multiple product-company roles\")\n    if is_consulting:\n        highlights.append(\"currently at a consulting firm\")\n\n    # Check for relevant description keywords\n    for role in career:\n        desc = role.get(\"description\", \"\").lower()\n        if any(kw in desc for kw in [\"ranking\", \"retrieval\", \"search\", \"recommendation\"]):\n            highlights.append(f\"relevant systems work at {role.get('company', 'prior company')}\")\n            break\n        if any(kw in desc for kw in [\"embeddings\", \"vector\", \"semantic\"]):\n            highlights.append(f\"embeddings/vector experience at {role.get('company', 'prior company')}\")\n            break\n        if any(kw in desc for kw in [\"deployed\", \"production\", \"shipped\"]):\n            highlights.append(f\"production ML deployment at {role.get('company', 'prior company')}\")\n            break\n\n    return highlights\n\n\ndef _get_concerns(candidate: dict, score_breakdown: dict) -> list[str]:\n    \"\"\"Identify honest concerns about the candidate.\"\"\"\n    concerns = []\n    profile = candidate.get(\"profile\", {})\n    signals = candidate.get(\"redrob_signals\", {})\n\n    # Notice period\n    notice = signals.get(\"notice_period_days\", 0)\n    if notice > 90:\n        concerns.append(f\"long notice period ({notice} days)\")\n    elif notice > 60:\n        concerns.append(f\"moderate notice period ({notice} days)\")\n\n    # Location\n    country = profile.get(\"country\", \"\").lower()\n    location = profile.get(\"location\", \"\")\n    willing = signals.get(\"willing_to_relocate\", False)\n    if country != \"india\" and not willing:\n        concerns.append(f\"based in {location}, not willing to relocate\")\n    elif country != \"india\" and willing:\n        concerns.append(f\"based in {location}, willing to relocate but outside India\")\n\n    # Experience band\n    years = profile.get(\"years_of_experience\", 0)\n    if years < 4:\n        concerns.append(f\"only {years:.1f} years experience (JD prefers 5-9)\")\n    elif years > 12:\n        concerns.append(f\"{years:.1f} years experience may be overqualified for hands-on coding role\")\n\n    # Response rate\n    response_rate = signals.get(\"recruiter_response_rate\", 0.5)\n    if response_rate < 0.3:\n        concerns.append(f\"low recruiter response rate ({response_rate:.0%})\")\n\n    # Recency\n    last_active = signals.get(\"last_active_date\", \"\")\n    if last_active:\n        try:\n            la = datetime.strptime(last_active, \"%Y-%m-%d\").date()\n            days_ago = (REFERENCE_DATE - la).days\n            if days_ago > 180:\n                concerns.append(f\"inactive for {days_ago // 30} months\")\n            elif days_ago > 90:\n                concerns.append(\"not recently active on platform\")\n        except (ValueError, TypeError):\n            pass\n\n    # Low scores in key dimensions\n    if score_breakdown.get(\"skills_match\", 0) < 0.2:\n        concerns.append(\"limited relevant skill coverage\")\n\n    return concerns\n\n\ndef generate_reasoning(\n    candidate: dict,\n    rank: int,\n    final_score: float,\n    score_breakdown: dict,\n) -> str:\n    \"\"\"\n    Generate a specific, honest 1-2 sentence reasoning for this candidate.\n\n    The reasoning is built from actual profile data, not templates.\n    Tone matches the rank position.\n    \"\"\"\n    profile = candidate.get(\"profile\", {})\n    signals = candidate.get(\"redrob_signals\", {})\n\n    title = profile.get(\"current_title\", \"Unknown\")\n    company = profile.get(\"current_company\", \"Unknown\")\n    years = profile.get(\"years_of_experience\", 0)\n    location = profile.get(\"location\", \"Unknown\")\n\n    # Get matching skills\n    must_have_matches = _get_matching_skill_names(candidate, MUST_HAVE_SKILLS)\n    strong_want_matches = _get_matching_skill_names(candidate, STRONG_WANT_SKILLS)\n\n    # Get career highlights\n    highlights = _get_career_highlights(candidate)\n\n    # Get concerns\n    concerns = _get_concerns(candidate, score_breakdown)\n\n    # Build the reasoning based on rank tier\n    parts = []\n\n    # --- First sentence: Who they are and why they fit ---\n    # Vary the opener based on rank\n    if rank <= 10:\n        # Top 10: Confident, specific\n        skill_str = \", \".join(must_have_matches[:3]) if must_have_matches else \\\n                    \", \".join(strong_want_matches[:3]) if strong_want_matches else \"relevant AI/ML skills\"\n        parts.append(\n            f\"{title} at {company} with {years:.1f} years experience; \"\n            f\"strong match with {skill_str}\"\n        )\n        if highlights:\n            parts[-1] += f\" and {highlights[0]}\"\n        parts[-1] += \".\"\n\n    elif rank <= 30:\n        # Ranks 11-30: Solid but note differentiators\n        if must_have_matches:\n            parts.append(\n                f\"{years:.1f}-year {title} with relevant skills including \"\n                f\"{', '.join(must_have_matches[:2])}; {location}-based.\"\n            )\n        elif strong_want_matches:\n            parts.append(\n                f\"{title} ({years:.1f} yrs) with {', '.join(strong_want_matches[:3])}; \"\n                f\"solid adjacent skill set for the role.\"\n            )\n        else:\n            parts.append(\n                f\"{title} at {company} ({years:.1f} yrs); career trajectory \"\n                f\"aligns with applied AI engineering.\"\n            )\n\n    elif rank <= 60:\n        # Ranks 31-60: Balanced, acknowledge gaps\n        if must_have_matches or strong_want_matches:\n            all_matches = must_have_matches + strong_want_matches\n            parts.append(\n                f\"{title} ({years:.1f} yrs, {location}) with some relevant skills \"\n                f\"({', '.join(all_matches[:2])}).\"\n            )\n        else:\n            parts.append(\n                f\"{title} at {company} ({years:.1f} yrs); some career signals \"\n                f\"suggest potential fit despite limited direct AI/ML skill coverage.\"\n            )\n\n    else:\n        # Ranks 61-100: Hedged, honest about why they're lower\n        parts.append(\n            f\"{title} at {company} ({years:.1f} yrs, {location}).\"\n        )\n\n    # --- Second sentence: Concerns or supporting detail ---\n    if rank <= 20 and concerns:\n        # Top 20: Mention main concern briefly\n        parts.append(f\"Minor concern: {concerns[0]}.\")\n    elif rank <= 20 and highlights:\n        parts.append(f\"Additional strength: {highlights[-1] if len(highlights) > 1 else 'strong behavioral signals'}.\")\n    elif 20 < rank <= 50 and concerns:\n        parts.append(f\"Note: {concerns[0]}.\")\n    elif 50 < rank <= 80:\n        if concerns:\n            parts.append(f\"Gaps include {concerns[0]}{' and ' + concerns[1] if len(concerns) > 1 else ''}.\")\n        else:\n            parts.append(\"Included based on partial skill alignment and behavioral signals.\")\n    else:\n        # Ranks 81-100\n        if concerns:\n            concern_str = \"; \".join(concerns[:2])\n            parts.append(f\"Near cutoff \u2014 {concern_str}.\")\n        else:\n            parts.append(\"Near cutoff; included as marginal fit based on available signals.\")\n\n    # Combine and clean\n    reasoning = \" \".join(parts)\n\n    # Ensure it's not too long (target: 1-2 sentences, ~150-300 chars)\n    if len(reasoning) > 400:\n        reasoning = reasoning[:397] + \"...\"\n\n    # Escape any problematic CSV characters\n    reasoning = reasoning.replace('\"', \"'\")\n\n    return reasoning\n", "ranker.py": "\"\"\"\nranker.py \u2014 Stage 5: Orchestrates all scoring stages and produces final ranking.\n\nPipeline:\n1. Pre-filter (100K \u2192 subset)\n2. Honeypot detection (flag traps)\n3. Multi-dimensional base scoring\n4. Behavioral signal modifier\n5. Final score = base \u00d7 behavioral\n6. Sort, select top 100, generate reasoning\n\"\"\"\n\nimport time\n\nfrom prefilter import prefilter\nfrom honeypot import detect_honeypots\nfrom scorer import compute_base_score\nfrom behavioral import compute_behavioral_modifier\nfrom reasoning import generate_reasoning\n\n\ndef rank_candidates(candidates: list[dict], verbose: bool = False) -> list[dict]:\n    \"\"\"\n    Run the full ranking pipeline on all candidates.\n\n    Args:\n        candidates: List of all candidate dicts from JSONL.\n        verbose: If True, print detailed progress info.\n\n    Returns:\n        List of 100 dicts, each with:\n        - candidate_id\n        - rank (1-100)\n        - score (float, non-increasing)\n        - reasoning (string)\n    \"\"\"\n    total_start = time.time()\n\n    # ========================================================================\n    # Stage 1: Pre-filter\n    # ========================================================================\n    stage_start = time.time()\n    filtered = prefilter(candidates)\n    if verbose:\n        print(f\"  Stage 1 (pre-filter): {time.time() - stage_start:.2f}s\")\n\n    # ========================================================================\n    # Stage 3 (run early): Honeypot detection on ALL candidates\n    # We detect honeypots on the filtered set to save time,\n    # but we only need to ensure none sneak into top 100.\n    # ========================================================================\n    stage_start = time.time()\n    honeypot_flags = detect_honeypots(filtered)\n    if verbose:\n        print(f\"  Stage 3 (honeypots): {time.time() - stage_start:.2f}s\")\n\n    # ========================================================================\n    # Stage 2 + 4: Score all filtered candidates\n    # ========================================================================\n    stage_start = time.time()\n    scored_candidates = []\n\n    for i, candidate in enumerate(filtered):\n        cid = candidate.get(\"candidate_id\", \"\")\n\n        # Skip honeypots entirely \u2014 force them to score 0\n        if cid in honeypot_flags:\n            continue\n\n        # Compute base score (multi-dimensional)\n        base_score, breakdown = compute_base_score(candidate)\n\n        # Apply behavioral modifier\n        behavioral_mod, beh_breakdown = compute_behavioral_modifier(candidate)\n\n        # Final score\n        final_score = base_score * behavioral_mod\n\n        scored_candidates.append({\n            \"candidate\": candidate,\n            \"candidate_id\": cid,\n            \"base_score\": base_score,\n            \"behavioral_mod\": behavioral_mod,\n            \"final_score\": final_score,\n            \"score_breakdown\": breakdown,\n            \"behavioral_breakdown\": beh_breakdown,\n        })\n\n        if verbose and (i + 1) % 5000 == 0:\n            print(f\"    Scored {i + 1:,}/{len(filtered):,} candidates...\")\n\n    if verbose:\n        print(f\"  Stage 2+4 (scoring): {time.time() - stage_start:.2f}s\")\n        print(f\"  Total scored: {len(scored_candidates):,} \"\n              f\"(after removing {len(honeypot_flags)} honeypots)\")\n\n    # ========================================================================\n    # Stage 5: Sort and select top 100\n    # ========================================================================\n    stage_start = time.time()\n\n    # Sort by final_score descending, then by candidate_id ascending for ties\n    scored_candidates.sort(\n        key=lambda x: (-x[\"final_score\"], x[\"candidate_id\"])\n    )\n\n    # Take top 100\n    top_100 = scored_candidates[:100]\n\n    if verbose:\n        print(f\"  Stage 5 (ranking): {time.time() - stage_start:.2f}s\")\n\n    # ========================================================================\n    # Stage 6: Generate reasoning for each of the top 100\n    # ========================================================================\n    stage_start = time.time()\n    results = []\n\n    for rank, entry in enumerate(top_100, start=1):\n        reasoning = generate_reasoning(\n            candidate=entry[\"candidate\"],\n            rank=rank,\n            final_score=entry[\"final_score\"],\n            score_breakdown=entry[\"score_breakdown\"],\n        )\n\n        results.append({\n            \"candidate_id\": entry[\"candidate_id\"],\n            \"rank\": rank,\n            \"score\": entry[\"final_score\"],  # Keep full precision for now\n            \"reasoning\": reasoning,\n        })\n\n    # Post-process: ensure all scores are unique and properly ordered.\n    # The validator requires:\n    # 1. Scores non-increasing with rank\n    # 2. Equal scores must have candidate_id ascending\n    #\n    # Strategy: re-sort by (score desc, candidate_id asc), then assign\n    # monotonically decreasing scores using a small epsilon.\n    results.sort(key=lambda x: (-x[\"score\"], x[\"candidate_id\"]))\n\n    # Re-assign ranks after proper sort\n    for i, r in enumerate(results):\n        r[\"rank\"] = i + 1\n\n    # Ensure scores are strictly decreasing to avoid tie-break issues\n    for i in range(1, len(results)):\n        if results[i][\"score\"] >= results[i - 1][\"score\"]:\n            results[i][\"score\"] = results[i - 1][\"score\"] - 0.000001\n\n    if verbose:\n        print(f\"  Stage 6 (reasoning): {time.time() - stage_start:.2f}s\")\n\n    total_elapsed = time.time() - total_start\n    print(f\"\\nTotal pipeline time: {total_elapsed:.2f}s\")\n\n    # Print summary of top 10\n    print(\"\\n=== Top 10 Candidates ===\")\n    for r in results[:10]:\n        print(f\"  Rank {r['rank']:>3}: {r['candidate_id']} \"\n              f\"(score: {r['score']:.4f}) \u2014 {r['reasoning'][:80]}...\")\n\n    # Print score distribution\n    scores = [r[\"score\"] for r in results]\n    print(f\"\\nScore range: {min(scores):.4f} \u2014 {max(scores):.4f}\")\n    print(f\"Median score: {scores[49]:.4f}\")\n\n    return results\n"};
      stlite.mount({
