<!DOCTYPE html>

    <style>

        position: fixed; top: 0; left: 0; width: 100%; height: 100%;

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.64.2/build/stlite.js"></script>
    <script>
      // All Python source files and data bundled here
      const filesData = {"app.py": "import streamlit as st\nimport pandas as pd\nimport json\nimport gzip\nimport os\nimport yaml\nimport plotly.express as px\nimport plotly.graph_objects as go\nfrom pathlib import Path\n\n# Set Page Config for beautiful wide layout\nst.set_page_config(\n    page_title=\"Redrob AI Candidate Ranker Sandbox\",\n    page_icon=\"🔍\",\n    layout=\"wide\",\n    initial_sidebar_state=\"expanded\"\n)\n\n# Custom premium styling using CSS injections\nst.markdown(\"\"\"\n<style>\n    /* Dark glassmorphic accent header */\n    .header-container {\n        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);\n        padding: 2.5rem;\n        border-radius: 12px;\n        color: white;\n        margin-bottom: 2rem;\n        box-shadow: 0 4px 20px rgba(0,0,0,0.1);\n    }\n    .header-title {\n        font-family: 'Outfit', 'Inter', sans-serif;\n        font-size: 2.8rem;\n        font-weight: 800;\n        margin: 0;\n        letter-spacing: -0.5px;\n    }\n    .header-subtitle {\n        font-size: 1.1rem;\n        opacity: 0.9;\n        margin-top: 0.5rem;\n    }\n    \n    /* Premium card containers */\n    .metric-card {\n        background-color: #ffffff;\n        border: 1px solid #eef2f6;\n        border-radius: 10px;\n        padding: 1.5rem;\n        box-shadow: 0 4px 6px rgba(0,0,0,0.02);\n        transition: transform 0.2s ease;\n    }\n    .metric-card:hover {\n        transform: translateY(-2px);\n        box-shadow: 0 6px 12px rgba(0,0,0,0.05);\n    }\n    \n    /* Badges */\n    .badge {\n        display: inline-block;\n        padding: 0.25rem 0.6rem;\n        font-size: 0.8rem;\n        font-weight: 600;\n        border-radius: 4px;\n        margin-right: 0.5rem;\n    }\n    .badge-must { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }\n    .badge-want { background-color: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }\n    .badge-nice { background-color: #fff3e0; color: #ef6c00; border: 1px solid #ffe0b2; }\n    .badge-none { background-color: #eceff1; color: #37474f; border: 1px solid #cfd8dc; }\n</style>\n\"\"\", unsafe_allow_html=True)\n\n# Import backend modules\nimport config\nfrom loader import load_candidates\nfrom prefilter import prefilter\nfrom honeypot import detect_honeypots\nfrom scorer import compute_base_score\nfrom behavioral import compute_behavioral_modifier\nfrom reasoning import generate_reasoning\nfrom ranker import rank_candidates\n\n# Default config weights\nDEFAULT_WEIGHTS = {\n    \"title_career\": 0.30,\n    \"skills_match\": 0.25,\n    \"career_description\": 0.15,\n    \"experience_fit\": 0.15,\n    \"location\": 0.10,\n    \"education\": 0.05,\n}\n\n# Initialize session state for slider values on first run\nfor key, val in DEFAULT_WEIGHTS.items():\n    if f\"w_{key}\" not in st.session_state:\n        st.session_state[f\"w_{key}\"] = val\n\n# Header Banner\nst.markdown(\"\"\"\n<div class=\"header-container\">\n    <div class=\"header-title\">🔍 Redrob AI Candidate Ranker Sandbox</div>\n    <div class=\"header-subtitle\">Intelligent Candidate Discovery & Ranking Engine — Interactive Exploration Sandbox</div>\n</div>\n\"\"\", unsafe_allow_html=True)\n\n# Sidebar - Settings & File Upload\nst.sidebar.header(\"⚙️ Pipeline Configuration\")\n\n# 1. Data Source Selection\ndata_source = st.sidebar.radio(\n    \"Select Candidate Dataset:\",\n    [\"Sample Candidates (50)\", \"Upload Custom Dataset\"]\n)\n\ncandidates_data = []\ndataset_name = \"\"\n\nif data_source == \"Sample Candidates (50)\":\n    sample_path = Path(\"sample_candidates.json\")\n    if sample_path.exists():\n        try:\n            with open(sample_path, \"r\", encoding=\"utf-8\") as f:\n                candidates_data = json.load(f)\n            dataset_name = \"sample_candidates.json\"\n        except Exception as e:\n            st.sidebar.error(f\"Error loading sample: {e}\")\n    else:\n        st.sidebar.error(\"sample_candidates.json not found in work directory.\")\nelse:\n    uploaded_file = st.sidebar.file_uploader(\n        \"Upload JSON or JSONL (optionally .gz)\",\n        type=[\"json\", \"jsonl\", \"gz\"]\n)\n    if uploaded_file is not None:\n        try:\n            # Handle gzipped files\n            if uploaded_file.name.endswith(\".gz\"):\n                with gzip.open(uploaded_file, \"rt\", encoding=\"utf-8\") as f:\n                    if uploaded_file.name.replace(\".gz\", \"\").endswith(\".json\"):\n                        candidates_data = json.load(f)\n                    else:  # Assume JSONL\n                        candidates_data = [json.loads(line) for line in f if line.strip()]\n            # Handle standard json/jsonl\n            else:\n                content = uploaded_file.read().decode(\"utf-8\")\n                if uploaded_file.name.endswith(\".json\"):\n                    candidates_data = json.loads(content)\n                else:  # jsonl\n                    candidates_data = [json.loads(line) for line in content.splitlines() if line.strip()]\n            dataset_name = uploaded_file.name\n        except Exception as e:\n            st.sidebar.error(f\"Error loading uploaded file: {e}\")\n\n# If we have no data, stop\nif not candidates_data:\n    st.info(\"👋 Please upload a candidate dataset or select the sample candidates to begin.\")\n    st.stop()\n\n# 2. Pipeline Stage Toggles\nst.sidebar.subheader(\"Filter & Honeypot Options\")\nenable_prefilter = st.sidebar.checkbox(\"Enable Stage 1 Pre-filter\", value=True)\nenable_honeypots = st.sidebar.checkbox(\"Filter out Honeypots (Traps)\", value=True)\n\n# 3. Dynamic Weight Tuning\nst.sidebar.subheader(\"Scoring Weight Tuning\")\nst.sidebar.markdown(\"<small>Adjust sliders below. Weights are auto-normalized to sum to 100%.</small>\", unsafe_allow_html=True)\n\n# Reset button must update session_state BEFORE sliders render\nif st.sidebar.button(\"↺ Reset Weights to Default\"):\n    for key, val in DEFAULT_WEIGHTS.items():\n        st.session_state[f\"w_{key}\"] = val\n\n# Sliders use session_state as their value source (key= binds them two-way)\nw_title = st.sidebar.slider(\"Title & Career Trajectory\", 0.0, 1.0, step=0.05, key=\"w_title_career\")\nw_skills = st.sidebar.slider(\"Skills Alignment\",          0.0, 1.0, step=0.05, key=\"w_skills_match\")\nw_desc   = st.sidebar.slider(\"Career Description Analysis\",0.0, 1.0, step=0.05, key=\"w_career_description\")\nw_exp    = st.sidebar.slider(\"Experience Band Fit\",        0.0, 1.0, step=0.05, key=\"w_experience_fit\")\nw_loc    = st.sidebar.slider(\"Location Proximity\",         0.0, 1.0, step=0.05, key=\"w_location\")\nw_edu    = st.sidebar.slider(\"Education Background\",       0.0, 1.0, step=0.05, key=\"w_education\")\n\n# Show live normalized percentages\nsum_w = w_title + w_skills + w_desc + w_exp + w_loc + w_edu\nif sum_w == 0:\n    sum_w = 1.0\nw_title_n = w_title / sum_w\nw_skills_n = w_skills / sum_w\nw_desc_n   = w_desc   / sum_w\nw_exp_n    = w_exp    / sum_w\nw_loc_n    = w_loc    / sum_w\nw_edu_n    = w_edu    / sum_w\n\nst.sidebar.caption(\n    f\"Normalized: Title {w_title_n:.0%} · Skills {w_skills_n:.0%} · Desc {w_desc_n:.0%} · \"\n    f\"Exp {w_exp_n:.0%} · Loc {w_loc_n:.0%} · Edu {w_edu_n:.0%}\"\n)\n\n# Apply to global config — use .update() NOT reassignment\n# scorer.py holds a reference to this same dict object;\n# reassigning would create a new dict scorer.py never sees.\nconfig.WEIGHTS.update({\n    \"title_career\":      w_title_n,\n    \"skills_match\":      w_skills_n,\n    \"career_description\": w_desc_n,\n    \"experience_fit\":    w_exp_n,\n    \"location\":          w_loc_n,\n    \"education\":         w_edu_n,\n})\n\n# Run Pipeline\n# NOTE: We do NOT use @st.cache_data here because:\n# (a) candidates is a list-of-dicts which is unhashable in stlite\n# (b) we WANT re-scoring when weights change\ndef run_pipeline(candidates, enable_pre, enable_hp, weights_tuple):\n    # Apply weights to config — mutate in place so scorer.py sees the update\n    config.WEIGHTS.update({\n        \"title_career\":      weights_tuple[0],\n        \"skills_match\":      weights_tuple[1],\n        \"career_description\": weights_tuple[2],\n        \"experience_fit\":    weights_tuple[3],\n        \"location\":          weights_tuple[4],\n        \"education\":         weights_tuple[5],\n    })\n    \n    # 1. Pre-filter\n    if enable_pre:\n        filtered = prefilter(candidates)\n        prefiltered_count = len(candidates) - len(filtered)\n    else:\n        filtered = candidates\n        prefiltered_count = 0\n\n    # 2. Honeypot detection\n    honeypot_flags = detect_honeypots(filtered)\n    honeypot_count = len(honeypot_flags)\n\n    # 3. Score all filtered candidates\n    scored_candidates = []\n    excluded_candidates = []\n\n    for candidate in filtered:\n        cid = candidate.get(\"candidate_id\", \"\")\n\n        # Skip honeypots if enabled\n        if enable_hp and cid in honeypot_flags:\n            excluded_candidates.append(candidate)\n            continue\n\n        base_score, breakdown = compute_base_score(candidate)\n        behavioral_mod, beh_breakdown = compute_behavioral_modifier(candidate)\n        final_score = base_score * behavioral_mod\n\n        scored_candidates.append({\n            \"candidate\": candidate,\n            \"candidate_id\": cid,\n            \"name\": candidate.get(\"profile\", {}).get(\"anonymized_name\", \"Anonymized\"),\n            \"current_title\": candidate.get(\"profile\", {}).get(\"current_title\", \"N/A\"),\n            \"current_company\": candidate.get(\"profile\", {}).get(\"current_company\", \"N/A\"),\n            \"years_exp\": candidate.get(\"profile\", {}).get(\"years_of_experience\", 0),\n            \"location\": f\"{candidate.get('profile', {}).get('location', 'N/A')}, {candidate.get('profile', {}).get('country', 'N/A')}\",\n            \"base_score\": base_score,\n            \"behavioral_mod\": behavioral_mod,\n            \"final_score\": final_score,\n            \"score_breakdown\": breakdown,\n            \"behavioral_breakdown\": beh_breakdown,\n        })\n\n    # Sort\n    scored_candidates.sort(key=lambda x: (-x[\"final_score\"], x[\"candidate_id\"]))\n    \n    # Take top 100 (or all if less than 100)\n    top_n = scored_candidates[:100]\n    \n    # Apply tie-breaking and non-increasing scores exactly like ranker.py\n    for i, r in enumerate(top_n):\n        r[\"rank\"] = i + 1\n        \n    for i in range(1, len(top_n)):\n        if top_n[i][\"final_score\"] >= top_n[i-1][\"final_score\"]:\n            top_n[i][\"final_score\"] = top_n[i-1][\"final_score\"] - 0.000001\n            \n    # Generate reasoning for top_n\n    for entry in top_n:\n        entry[\"reasoning\"] = generate_reasoning(\n            candidate=entry[\"candidate\"],\n            rank=entry[\"rank\"],\n            final_score=entry[\"final_score\"],\n            score_breakdown=entry[\"score_breakdown\"],\n        )\n        \n    return top_n, len(candidates), prefiltered_count, honeypot_count, scored_candidates\n\nweights_tuple = (w_title_n, w_skills_n, w_desc_n, w_exp_n, w_loc_n, w_edu_n)\ntop_results, total_count, prefiltered_count, honeypot_count, all_scored = run_pipeline(\n    candidates_data, enable_prefilter, enable_honeypots, weights_tuple\n)\n\n# Statistics Dashboard Cards\nc1, c2, c3, c4 = st.columns(4)\nwith c1:\n    st.markdown(f\"\"\"\n    <div class=\"metric-card\">\n        <div style=\"font-size: 0.9rem; color: #64748b; font-weight: 600;\">DATASET LOADED</div>\n        <div style=\"font-size: 1.8rem; font-weight: 700; color: #1e293b; margin-top: 0.5rem;\">{total_count:,}</div>\n        <div style=\"font-size: 0.8rem; color: #94a3b8; margin-top: 0.2rem;\">{dataset_name}</div>\n    </div>\n    \"\"\", unsafe_allow_html=True)\nwith c2:\n    st.markdown(f\"\"\"\n    <div class=\"metric-card\">\n        <div style=\"font-size: 0.9rem; color: #64748b; font-weight: 600;\">PRE-FILTER ELIMINATED</div>\n        <div style=\"font-size: 1.8rem; font-weight: 700; color: #ef4444; margin-top: 0.5rem;\">{prefiltered_count:,}</div>\n        <div style=\"font-size: 0.8rem; color: #94a3b8; margin-top: 0.2rem;\">{\"\" if not enable_prefilter else \"Stage 1 active\"}</div>\n    </div>\n    \"\"\", unsafe_allow_html=True)\nwith c3:\n    st.markdown(f\"\"\"\n    <div class=\"metric-card\">\n        <div style=\"font-size: 0.9rem; color: #64748b; font-weight: 600;\">HONEYPOTS EXCLUDED</div>\n        <div style=\"font-size: 1.8rem; font-weight: 700; color: #f59e0b; margin-top: 0.5rem;\">{honeypot_count:,}</div>\n        <div style=\"font-size: 0.8rem; color: #94a3b8; margin-top: 0.2rem;\">{\"Exclusion active\" if enable_honeypots else \"Exclusion disabled\"}</div>\n    </div>\n    \"\"\", unsafe_allow_html=True)\nwith c4:\n    avg_score = sum(x['final_score'] for x in top_results) / len(top_results) if top_results else 0.0\n    st.markdown(f\"\"\"\n    <div class=\"metric-card\">\n        <div style=\"font-size: 0.9rem; color: #64748b; font-weight: 600;\">AVG SCORE (TOP 100)</div>\n        <div style=\"font-size: 1.8rem; font-weight: 700; color: #10b981; margin-top: 0.5rem;\">{avg_score:.4f}</div>\n        <div style=\"font-size: 0.8rem; color: #94a3b8; margin-top: 0.2rem;\">Final weighted score</div>\n    </div>\n    \"\"\", unsafe_allow_html=True)\n\nst.markdown(\"<br>\", unsafe_allow_html=True)\n\n# Tabs\ntab_lead, tab_inspect, tab_analytics, tab_meta = st.tabs([\n    \"🏆 Leaderboard\", \n    \"👤 Candidate Inspector\", \n    \"📈 Analytics & Distributions\", \n    \"📄 Submission Metadata\"\n])\n\n# ==========================================\n# TAB 1: LEADERBOARD\n# ==========================================\nwith tab_lead:\n    st.subheader(\"Top Ranked Candidates\")\n    \n    if not top_results:\n        st.warning(\"No candidates scored.\")\n    else:\n        # Create dataframe for leaderboard table\n        lead_df = pd.DataFrame([\n            {\n                \"Rank\": r[\"rank\"],\n                \"ID\": r[\"candidate_id\"],\n                \"Name\": r[\"name\"],\n                \"Title\": r[\"current_title\"],\n                \"Company\": r[\"current_company\"],\n                \"Experience (Yrs)\": r[\"years_exp\"],\n                \"Location\": r[\"location\"],\n                \"Base Score\": round(r[\"base_score\"], 4),\n                \"Behavioral Mod\": round(r[\"behavioral_mod\"], 2),\n                \"Final Score\": round(r[\"final_score\"], 6)\n            }\n            for r in top_results\n        ])\n        \n        st.dataframe(\n            lead_df,\n            column_config={\n                \"Rank\": st.column_config.NumberColumn(width=60),\n                \"ID\": st.column_config.TextColumn(width=120),\n                \"Final Score\": st.column_config.NumberColumn(format=\"%.6f\"),\n            },\n            hide_index=True,\n            use_container_width=True\n        )\n\n        # Download submission CSV button\n        csv_content = pd.DataFrame([\n            {\n                \"candidate_id\": r[\"candidate_id\"],\n                \"rank\": r[\"rank\"],\n                \"score\": f\"{r['final_score']:.6f}\",\n                \"reasoning\": r[\"reasoning\"]\n            }\n            for r in top_results\n        ]).to_csv(index=False)\n\n        st.download_button(\n            label=\"📥 Download submission.csv\",\n            data=csv_content,\n            file_name=\"submission.csv\",\n            mime=\"text/csv\"\n        )\n\n# ==========================================\n# TAB 2: CANDIDATE INSPECTOR\n# ==========================================\nwith tab_inspect:\n    st.subheader(\"Deep Candidate Profiler\")\n    \n    if not top_results:\n        st.warning(\"No candidates available for inspection.\")\n    else:\n        # Candidate selection\n        cand_options = {f\"Rank {r['rank']}: {r['name']} ({r['candidate_id']})\": r for r in top_results}\n        selected_key = st.selectbox(\"Select Candidate to Inspect:\", list(cand_options.keys()))\n        \n        if selected_key:\n            entry = cand_options[selected_key]\n            cand = entry[\"candidate\"]\n            profile = cand.get(\"profile\", {})\n            \n            col_left, col_right = st.columns([1, 1])\n            \n            with col_left:\n                st.markdown(f\"### {profile.get('anonymized_name', 'Anonymized Candidate')} ({entry['candidate_id']})\")\n                st.markdown(f\"**Headline**: {profile.get('headline', 'N/A')}\")\n                st.markdown(f\"**Current Role**: {profile.get('current_title', 'N/A')} at **{profile.get('current_company', 'N/A')}** ({profile.get('current_company_size', 'N/A')} employees)\")\n                st.markdown(f\"**Experience**: {profile.get('years_of_experience', 0)} years | **Location**: {profile.get('location', 'N/A')}, {profile.get('country', 'N/A')}\")\n                st.markdown(f\"**Summary**:\")\n                st.info(profile.get(\"summary\", \"No summary provided.\"))\n                \n                # Reasoning\n                st.markdown(\"#### 💡 Auto-Generated Reasoning\")\n                st.success(entry[\"reasoning\"])\n                \n                # Education\n                st.markdown(\"#### 🎓 Education History\")\n                for edu in cand.get(\"education\", []):\n                    grade_str = f\" | Grade: {edu.get('grade')}\" if edu.get('grade') else \"\"\n                    st.markdown(f\"- **{edu.get('degree', 'Degree')} in {edu.get('field_of_study', 'Field')}**  \\n  {edu.get('institution', 'Institution')} ({edu.get('start_year', 'N/A')} - {edu.get('end_year', 'N/A')}) | {edu.get('tier', 'unknown').upper()}{grade_str}\")\n                    \n                # Career history\n                st.markdown(\"#### 💼 Work History Timeline\")\n                for job in cand.get(\"career_history\", []):\n                    current_badge = \" [CURRENT]\" if job.get(\"is_current\") else \"\"\n                    st.markdown(f\"- **{job.get('title')}** at {job.get('company')}{current_badge}  \\n  *{job.get('start_date')} to {job.get('end_date') or 'Present'} ({job.get('duration_months', 0)} months)*  \\n  {job.get('description', '')}\")\n            \n            with col_right:\n                st.markdown(\"### 📊 Scoring Breakdown\")\n                \n                # Plot Base Score Breakdown\n                breakdown = entry[\"score_breakdown\"]\n                w_labels = {\n                    \"title_career\": \"Title & Career Trajectory\",\n                    \"skills_match\": \"Skills Match\",\n                    \"career_description\": \"Career Description\",\n                    \"experience_fit\": \"Experience Fit\",\n                    \"location\": \"Location Proximity\",\n                    \"education\": \"Education\"\n                }\n                \n                score_data = pd.DataFrame([\n                    {\n                        \"Dimension\": w_labels[k],\n                        \"Raw Score\": round(v, 4),\n                        \"Weight\": round(config.WEIGHTS[k], 4),\n                        \"Weighted Contribution\": round(v * config.WEIGHTS[k], 4)\n                    }\n                    for k, v in breakdown.items()\n                ])\n                \n                # Multiplier visualization\n                st.metric(\n                    label=\"Final Combined Score (Base × Behavioral Modifier)\",\n                    value=f\"{entry['final_score']:.6f}\",\n                    delta=f\"Base: {entry['base_score']:.4f} | Mod: x{entry['behavioral_mod']:.2f}\"\n                )\n                \n                fig_base = px.bar(\n                    score_data,\n                    x=\"Dimension\",\n                    y=[\"Weighted Contribution\", \"Raw Score\"],\n                    barmode=\"group\",\n                    title=\"Base Score Component Contributions & Raw Scores\",\n                    color_discrete_sequence=[\"#1f77b4\", \"#aec7e8\"]\n                )\n                fig_base.update_layout(yaxis_range=[0, 1])\n                st.plotly_chart(fig_base, use_container_width=True)\n                \n                # Behavioral Modifiers\n                st.markdown(\"#### ⚡ Behavioral Signals Breakdown\")\n                beh_breakdown = entry[\"behavioral_breakdown\"]\n                \n                beh_df = pd.DataFrame([\n                    {\"Signal\": k.replace(\"_\", \" \").title(), \"Multiplier\": round(v, 3)}\n                    for k, v in beh_breakdown.items()\n                ])\n                \n                # Highlight impact (e.g. green for >1.0, red for <1.0)\n                fig_beh = px.bar(\n                    beh_df,\n                    y=\"Signal\",\n                    x=\"Multiplier\",\n                    orientation=\"h\",\n                    title=\"Behavioral Multipliers Impact (Neutral is 1.0)\",\n                    color=\"Multiplier\",\n                    color_continuous_scale=px.colors.diverging.RdYlGn,\n                    color_continuous_midpoint=1.0\n                )\n                st.plotly_chart(fig_beh, use_container_width=True)\n                \n                # Skills matching badge list\n                st.markdown(\"#### 🛠️ Skills Matching Profile\")\n                skills_list = cand.get(\"skills\", [])\n                \n                # Classify skills using backend categories\n                from config import MUST_HAVE_SKILLS, STRONG_WANT_SKILLS, NICE_TO_HAVE_SKILLS, NON_TECH_SKILLS\n                \n                must_have = []\n                strong_want = []\n                nice_to_have = []\n                other_tech = []\n                non_tech = []\n                \n                for s in skills_list:\n                    name = s.get(\"name\", \"\").lower().strip()\n                    prof = s.get(\"proficiency\", \"unknown\")\n                    dur = s.get(\"duration_months\", 0)\n                    endors = s.get(\"endorsements\", 0)\n                    display_text = f\"{s.get('name')} ({prof}, {dur}m, 👍{endors})\"\n                    \n                    if name in MUST_HAVE_SKILLS:\n                        must_have.append(display_text)\n                    elif name in STRONG_WANT_SKILLS:\n                        strong_want.append(display_text)\n                    elif name in NICE_TO_HAVE_SKILLS:\n                        nice_to_have.append(display_text)\n                    elif name in NON_TECH_SKILLS:\n                        non_tech.append(display_text)\n                    else:\n                        other_tech.append(display_text)\n                \n                if must_have:\n                    st.markdown(\"**Must-Have Skills:**\")\n                    for s in must_have:\n                        st.markdown(f'<span class=\"badge badge-must\">{s}</span>', unsafe_allow_html=True)\n                if strong_want:\n                    st.markdown(\"**Strong-Want Skills:**\")\n                    for s in strong_want:\n                        st.markdown(f'<span class=\"badge badge-want\">{s}</span>', unsafe_allow_html=True)\n                if nice_to_have:\n                    st.markdown(\"**Nice-To-Have Skills:**\")\n                    for s in nice_to_have:\n                        st.markdown(f'<span class=\"badge badge-nice\">{s}</span>', unsafe_allow_html=True)\n                if other_tech:\n                    st.markdown(\"**Other Tech Skills:**\")\n                    for s in other_tech:\n                        st.markdown(f'<span class=\"badge badge-nice\">{s}</span>', unsafe_allow_html=True)\n                if non_tech:\n                    st.markdown(\"**Non-Tech / Soft Skills:**\")\n                    for s in non_tech:\n                        st.markdown(f'<span class=\"badge badge-none\">{s}</span>', unsafe_allow_html=True)\n\n# ==========================================\n# TAB 3: ANALYTICS & DISTRIBUTIONS\n# ==========================================\nwith tab_analytics:\n    st.subheader(\"Dataset Demographics & Distributions\")\n    \n    if not all_scored:\n        st.warning(\"No data scored.\")\n    else:\n        # Prepare scoring dataframe\n        scored_df = pd.DataFrame([\n            {\n                \"candidate_id\": r[\"candidate_id\"],\n                \"years_exp\": r[\"years_exp\"],\n                \"base_score\": r[\"base_score\"],\n                \"behavioral_mod\": r[\"behavioral_mod\"],\n                \"final_score\": r[\"final_score\"],\n                \"location\": r[\"location\"]\n            }\n            for r in all_scored\n        ])\n        \n        col_an1, col_an2 = st.columns(2)\n        \n        with col_an1:\n            # Score distribution\n            fig_dist = px.histogram(\n                scored_df, \n                x=\"final_score\", \n                nbins=30,\n                title=\"Candidate Final Score Distribution\",\n                color_discrete_sequence=[\"#2a5298\"]\n            )\n            st.plotly_chart(fig_dist, use_container_width=True)\n            \n            # Scatter plot: Base Score vs Behavioral Mod\n            fig_scatter = px.scatter(\n                scored_df,\n                x=\"base_score\",\n                y=\"behavioral_mod\",\n                color=\"final_score\",\n                hover_data=[\"candidate_id\"],\n                title=\"Base Score vs. Behavioral Modifier\",\n                color_continuous_scale=\"Viridis\"\n            )\n            st.plotly_chart(fig_scatter, use_container_width=True)\n            \n        with col_an2:\n            # Experience distribution\n            fig_exp = px.histogram(\n                scored_df,\n                x=\"years_exp\",\n                nbins=20,\n                title=\"Years of Experience Distribution\",\n                color_discrete_sequence=[\"#10b981\"]\n            )\n            st.plotly_chart(fig_exp, use_container_width=True)\n            \n            # Top Locations\n            top_locs = scored_df[\"location\"].value_counts().reset_index()\n            top_locs.columns = [\"Location\", \"Count\"]\n            fig_loc = px.bar(\n                top_locs.head(10),\n                x=\"Count\",\n                y=\"Location\",\n                orientation=\"h\",\n                title=\"Top 10 Candidate Locations\",\n                color_discrete_sequence=[\"#8b5cf6\"]\n            )\n            st.plotly_chart(fig_loc, use_container_width=True)\n\n# ==========================================\n# TAB 4: SUBMISSION METADATA\n# ==========================================\nwith tab_meta:\n    st.subheader(\"Submission Metadata configuration (`submission_metadata.yaml`)\")\n    \n    meta_path = Path(\"submission_metadata.yaml\")\n    \n    # Check if file exists, if not write initial template\n    if not meta_path.exists():\n        default_meta = {\n            \"team_name\": \"Kalpit Phogat\",\n            \"primary_contact\": {\n                \"name\": \"Kalpit Phogat\",\n                \"email\": \"kalpitphogat@gmail.com\",\n                \"phone\": \"+91-XXXXXXXXXX\"\n            },\n            \"team_members\": [\n                {\n                    \"name\": \"Kalpit Phogat\",\n                    \"email\": \"kalpitphogat@gmail.com\",\n                    \"role\": \"ML Engineer\"\n                }\n            ],\n            \"github_repo\": \"https://github.com/kalpitphogat/redrob_AI\",\n            \"sandbox_link\": \"https://redrob-ai.streamlit.app\",\n            \"reproduce_command\": \"python rank.py --candidates ./candidates.jsonl --out ./submission.csv\",\n            \"compute\": {\n                \"platform\": \"Windows 11 PC\",\n                \"cpu_cores\": 12,\n                \"ram_gb\": 16,\n                \"python_version\": \"3.11.4\",\n                \"os\": \"Windows 11\",\n                \"uses_gpu_for_inference\": False,\n                \"has_network_during_ranking\": False,\n                \"pre_computation_required\": False,\n                \"pre_computation_time_minutes\": 0\n            },\n\n            \"methodology_summary\": \"Standard python implementation of multi-stage Candidate discovery. Consists of fast pre-filtering (Stage 1), honeypot extraction, title relevance mapping, semantic trust weighting on skills, and behavioral modifications.\",\n            \"declarations\": {\n                \"read_submission_spec\": True,\n                \"code_is_original_work\": True,\n                \"no_collusion\": True,\n                \"honeypot_check_done\": True,\n                \"reproduction_tested\": True\n            }\n        }\n        \n        try:\n            with open(meta_path, \"w\", encoding=\"utf-8\") as f:\n                yaml.dump(default_meta, f, default_flow_style=False, sort_keys=False)\n        except Exception as e:\n            st.error(f\"Error writing metadata file: {e}\")\n\n    # Read and allow editing/viewing\n    if meta_path.exists():\n        try:\n            with open(meta_path, \"r\", encoding=\"utf-8\") as f:\n                meta_content = f.read()\n                \n            st.markdown(\"You can edit the `submission_metadata.yaml` file directly below, then click **Save Changes** to write to the file.\")\n            \n            edited_meta = st.text_area(\n                label=\"submission_metadata.yaml contents\",\n                value=meta_content,\n                height=400\n            )\n            \n            if st.button(\"Save Changes\"):\n                try:\n                    # Validate YAML syntax\n                    yaml.safe_load(edited_meta)\n                    with open(meta_path, \"w\", encoding=\"utf-8\") as f:\n                        f.write(edited_meta)\n                    st.success(\"Successfully updated submission_metadata.yaml! ✅\")\n                    st.rerun()\n                except Exception as ex:\n                    st.error(f\"Invalid YAML syntax: {ex}\")\n                    \n            st.download_button(\n                label=\"📥 Download submission_metadata.yaml\",\n                data=edited_meta,\n                file_name=\"submission_metadata.yaml\",\n                mime=\"text/yaml\"\n            )\n        except Exception as e:\n            st.error(f\"Error reading metadata: {e}\")\n", "config.py": "\"\"\"\nconfig.py — Central configuration for the Redrob candidate ranking system.\n\nAll tunable weights, thresholds, keyword lists, and scoring parameters\nare defined here. Derived from careful analysis of the Senior AI Engineer\njob description at Redrob AI.\n\"\"\"\n\nfrom datetime import date\n\n# ============================================================================\n# Scoring dimension weights (must sum to 1.0)\n# ============================================================================\nWEIGHTS = {\n    \"title_career\": 0.30,       # Title relevance + career trajectory\n    \"skills_match\": 0.25,       # Skill-JD alignment with trust scoring\n    \"career_description\": 0.15, # NLP keywords in career history descriptions\n    \"experience_fit\": 0.15,     # Years-of-experience band fit\n    \"location\": 0.10,           # Geographic proximity to Pune/Noida\n    \"education\": 0.05,          # Degree + institution tier (low weight per JD)\n}\n\n# ============================================================================\n# Title relevance mapping\n# ============================================================================\n# Scores from 0.0 to 1.0 based on how well the title matches the JD.\n# The JD is for \"Senior AI Engineer\" on a founding team building\n# ranking/retrieval/matching systems.\nTITLE_SCORES = {\n    # Tier 1: Direct match\n    \"ai engineer\": 1.0,\n    \"senior ai engineer\": 1.0,\n    \"lead ai engineer\": 0.98,\n    \"staff ai engineer\": 0.95,\n    \"principal ai engineer\": 0.93,\n    \"ml engineer\": 0.95,\n    \"senior ml engineer\": 0.97,\n    \"lead ml engineer\": 0.96,\n    \"machine learning engineer\": 0.95,\n    \"senior machine learning engineer\": 0.97,\n    \"applied ml engineer\": 0.95,\n    \"nlp engineer\": 0.92,\n    \"senior nlp engineer\": 0.94,\n    \"search engineer\": 0.93,\n    \"ranking engineer\": 0.95,\n    \"recommendation engineer\": 0.90,\n    \"ai/ml engineer\": 1.0,\n\n    # Tier 2: Strong adjacent\n    \"data scientist\": 0.78,\n    \"senior data scientist\": 0.80,\n    \"lead data scientist\": 0.80,\n    \"applied scientist\": 0.82,\n    \"research engineer\": 0.72,\n    \"research scientist\": 0.68,\n    \"deep learning engineer\": 0.88,\n    \"ml scientist\": 0.75,\n    \"ai researcher\": 0.68,\n    \"computer vision engineer\": 0.55,  # JD says CV without NLP is a concern\n\n    # Tier 3: Adjacent technical\n    \"software engineer\": 0.50,\n    \"senior software engineer\": 0.52,\n    \"staff software engineer\": 0.50,\n    \"principal software engineer\": 0.48,\n    \"backend engineer\": 0.48,\n    \"senior backend engineer\": 0.50,\n    \"full stack engineer\": 0.40,\n    \"senior full stack engineer\": 0.42,\n    \"data engineer\": 0.48,\n    \"senior data engineer\": 0.50,\n    \"platform engineer\": 0.42,\n    \"infrastructure engineer\": 0.38,\n    \"site reliability engineer\": 0.30,\n    \"sre\": 0.30,\n\n    # Tier 4: Weakly relevant\n    \"data analyst\": 0.22,\n    \"senior data analyst\": 0.25,\n    \"business intelligence\": 0.15,\n    \"devops engineer\": 0.20,\n    \"qa engineer\": 0.12,\n    \"test engineer\": 0.10,\n    \"frontend engineer\": 0.12,\n    \"ios developer\": 0.10,\n    \"android developer\": 0.10,\n    \"product manager\": 0.18,\n    \"technical product manager\": 0.22,\n    \"engineering manager\": 0.25,\n    \"tech lead\": 0.35,\n    \"cto\": 0.30,\n    \"vp engineering\": 0.25,\n    \"project manager\": 0.08,\n    \"business analyst\": 0.08,\n    \"junior ml engineer\": 0.55,\n    \"junior data scientist\": 0.45,\n    \"junior software engineer\": 0.30,\n    \"intern\": 0.05,\n\n    # Tier 5: Not relevant\n    \"marketing manager\": 0.02,\n    \"hr manager\": 0.02,\n    \"operations manager\": 0.02,\n    \"accountant\": 0.01,\n    \"content writer\": 0.02,\n    \"sales executive\": 0.01,\n    \"customer support\": 0.01,\n    \"graphic designer\": 0.01,\n    \"mechanical engineer\": 0.03,\n    \"civil engineer\": 0.02,\n    \"electrical engineer\": 0.05,\n    \"ui designer\": 0.03,\n    \"ux designer\": 0.03,\n    \"ui/ux designer\": 0.03,\n}\n\n# ============================================================================\n# Skills taxonomy\n# ============================================================================\n# Points awarded per skill category. Within each category, trust-weighted.\n\nMUST_HAVE_SKILLS = {\n    # Embeddings & retrieval (JD: \"Production experience with embeddings-based retrieval\")\n    \"sentence-transformers\", \"sentence transformers\", \"bge\", \"e5 embeddings\",\n    \"embeddings\", \"word embeddings\", \"text embeddings\", \"embedding models\",\n    \"openai embeddings\",\n    # Vector DBs (JD: \"Production experience with vector databases or hybrid search\")\n    \"pinecone\", \"weaviate\", \"qdrant\", \"milvus\", \"faiss\",\n    \"elasticsearch\", \"opensearch\", \"elastic search\",\n    \"vector database\", \"vector search\", \"vector db\",\n    # Core language\n    \"python\",\n    # Ranking/Retrieval/Search (JD: \"ranking, retrieval, and matching systems\")\n    \"information retrieval\", \"ranking systems\", \"search systems\",\n    \"bm25\", \"retrieval systems\", \"re-ranking\", \"reranking\",\n    \"hybrid search\", \"semantic search\", \"dense retrieval\",\n    \"learning to rank\", \"learning-to-rank\",\n    # Evaluation (JD: \"designing evaluation frameworks for ranking systems\")\n    \"ndcg\", \"mrr\", \"mean average precision\",\n}\n\nSTRONG_WANT_SKILLS = {\n    # LLM fine-tuning (JD: \"LLM fine-tuning experience (LoRA, QLoRA, PEFT)\")\n    \"fine-tuning\", \"fine-tuning llms\", \"finetuning\", \"fine tuning\",\n    \"lora\", \"qlora\", \"peft\",\n    # Learning-to-rank (JD: \"learning-to-rank models (XGBoost-based or neural)\")\n    \"xgboost\", \"lightgbm\", \"catboost\", \"gradient boosting\",\n    # NLP fundamentals\n    \"nlp\", \"natural language processing\",\n    \"transformers\", \"huggingface\", \"hugging face\",\n    \"bert\", \"gpt\", \"t5\", \"llm\", \"large language models\",\n    \"spacy\", \"nltk\",\n    # Deep learning frameworks\n    \"pytorch\", \"tensorflow\", \"keras\", \"jax\",\n    # RAG & LLM systems\n    \"rag\", \"retrieval augmented generation\",\n    \"langchain\", \"llamaindex\", \"llama index\",\n    \"prompt engineering\",\n    # ML fundamentals\n    \"scikit-learn\", \"sklearn\",\n    \"deep learning\", \"neural networks\",\n    \"machine learning\",\n}\n\nNICE_TO_HAVE_SKILLS = {\n    # MLOps & Infra (JD: nice-to-have)\n    \"mlops\", \"ml ops\", \"mlflow\", \"kubeflow\", \"airflow\",\n    \"docker\", \"kubernetes\", \"k8s\",\n    \"fastapi\", \"flask\", \"django\",\n    \"aws\", \"gcp\", \"azure\", \"aws sagemaker\", \"sagemaker\",\n    # Data engineering adjacent\n    \"spark\", \"pyspark\", \"kafka\", \"redis\",\n    \"sql\", \"postgresql\", \"mongodb\", \"bigquery\", \"snowflake\",\n    \"pandas\", \"numpy\", \"dask\",\n    # Model serving\n    \"bentoml\", \"triton\", \"tensorrt\", \"onnx\",\n    \"model deployment\", \"model serving\",\n    # Experiment tracking\n    \"weights & biases\", \"wandb\", \"neptune\", \"dvc\",\n    # General engineering\n    \"git\", \"ci/cd\", \"terraform\",\n    \"distributed systems\", \"microservices\",\n    \"feature engineering\", \"statistical modeling\",\n    \"a/b testing\", \"experimentation\",\n    # Open source\n    \"open source\", \"open-source contributions\",\n}\n\n# Points per category (used in scoring)\nSKILL_CATEGORY_POINTS = {\n    \"must_have\": 5.0,\n    \"strong_want\": 3.0,\n    \"nice_to_have\": 1.0,\n}\n\n# Skills that are NON-TECHNICAL (used for anti-signal detection)\nNON_TECH_SKILLS = {\n    \"sales\", \"marketing\", \"seo\", \"content writing\", \"content marketing\",\n    \"accounting\", \"excel\", \"powerpoint\", \"photoshop\", \"illustrator\",\n    \"figma\", \"six sigma\", \"sap\", \"scrum\", \"project management\",\n    \"hr\", \"recruitment\", \"talent acquisition\",\n    \"autocad\", \"solidworks\", \"creo\", \"ansys\",\n    \"supply chain\", \"logistics\", \"procurement\",\n}\n\n# ============================================================================\n# Consulting firms (JD explicitly flags entire-career-at-consulting as red flag)\n# ============================================================================\nCONSULTING_FIRMS = {\n    \"tcs\", \"infosys\", \"wipro\", \"accenture\", \"cognizant\", \"capgemini\",\n    \"tech mahindra\", \"hcl\", \"hcl technologies\", \"mindtree\",\n    \"mphasis\", \"l&t infotech\", \"ltimindtree\", \"persistent systems\",\n    \"hexaware\", \"cyient\", \"zensar\", \"niit technologies\",\n    \"virtusa\", \"larsen & toubro infotech\",\n}\n\n# Product companies get a bonus\nPRODUCT_COMPANIES = {\n    \"google\", \"microsoft\", \"amazon\", \"meta\", \"facebook\", \"apple\",\n    \"netflix\", \"uber\", \"airbnb\", \"twitter\", \"x\",\n    \"flipkart\", \"swiggy\", \"zomato\", \"ola\", \"razorpay\",\n    \"phonepe\", \"paytm\", \"cred\", \"zerodha\", \"groww\",\n    \"freshworks\", \"zoho\", \"postman\", \"browserstack\",\n    \"atlassian\", \"adobe\", \"salesforce\", \"stripe\", \"square\",\n    \"databricks\", \"snowflake\", \"datadog\", \"elastic\",\n    \"huggingface\", \"hugging face\", \"openai\", \"anthropic\", \"cohere\",\n    \"meesho\", \"dream11\", \"upstox\", \"unacademy\",\n    \"sharechat\", \"dailyhunt\", \"myntra\", \"nykaa\",\n    \"redrob\",\n    # Also small product startups (matched by company_size)\n    \"pied piper\",  # Fictional but in dataset as startup\n}\n\n# ============================================================================\n# Location scoring\n# ============================================================================\nLOCATION_TIER_SCORES = {\n    # Tier 1: Preferred (JD says Pune/Noida)\n    \"pune\": 1.0,\n    \"noida\": 1.0,\n    # Tier 2: Delhi NCR (JD says \"Delhi NCR welcome\")\n    \"delhi\": 0.95,\n    \"new delhi\": 0.95,\n    \"gurgaon\": 0.95,\n    \"gurugram\": 0.95,\n    \"greater noida\": 0.95,\n    \"faridabad\": 0.92,\n    \"ghaziabad\": 0.92,\n    # Tier 3: Other Tier-1 Indian cities (JD says \"Hyderabad, Mumbai welcome\")\n    \"bangalore\": 0.85,\n    \"bengaluru\": 0.85,\n    \"hyderabad\": 0.85,\n    \"mumbai\": 0.85,\n    # Tier 4: Other major Indian cities\n    \"chennai\": 0.78,\n    \"kolkata\": 0.75,\n    \"ahmedabad\": 0.72,\n    \"jaipur\": 0.70,\n    \"lucknow\": 0.70,\n    \"chandigarh\": 0.72,\n    \"indore\": 0.68,\n    \"kochi\": 0.68,\n    \"coimbatore\": 0.65,\n    \"thiruvananthapuram\": 0.65,\n    \"bhopal\": 0.65,\n    \"nagpur\": 0.65,\n    \"visakhapatnam\": 0.65,\n}\n\nINDIA_OTHER_RELOCATE = 0.65\nINDIA_OTHER_NO_RELOCATE = 0.35\nOUTSIDE_INDIA_RELOCATE = 0.25\nOUTSIDE_INDIA_NO_RELOCATE = 0.08\n\nINDIA_COUNTRY = \"india\"\n\n# ============================================================================\n# Experience scoring\n# ============================================================================\n# JD says 5-9 years, but flexible. Disqualifiers at extremes.\nEXPERIENCE_IDEAL_MIN = 5.0\nEXPERIENCE_IDEAL_MAX = 9.0\nEXPERIENCE_ACCEPTABLE_MIN = 3.0\nEXPERIENCE_ACCEPTABLE_MAX = 14.0\nEXPERIENCE_HARD_MIN = 1.5\nEXPERIENCE_HARD_MAX = 20.0\n\n# ============================================================================\n# Career description keyword analysis\n# ============================================================================\nSTRONG_POSITIVE_KEYWORDS = [\n    \"ranking system\", \"retrieval system\", \"recommendation system\",\n    \"search system\", \"matching system\", \"candidate matching\",\n    \"embeddings\", \"vector search\", \"semantic search\",\n    \"hybrid search\", \"dense retrieval\", \"re-ranking\",\n    \"deployed\", \"production\", \"shipped\", \"launched\",\n    \"end-to-end\", \"real-time\", \"real time\",\n    \"inference\", \"model serving\", \"latency\",\n    \"a/b test\", \"a/b testing\", \"ndcg\", \"evaluation framework\",\n    \"recruiter\", \"talent\", \"hiring\",\n    \"information retrieval\",\n]\n\nMODERATE_POSITIVE_KEYWORDS = [\n    \"machine learning\", \"deep learning\", \"neural network\",\n    \"nlp\", \"natural language\", \"text classification\",\n    \"transformer\", \"fine-tun\", \"training pipeline\",\n    \"feature engineering\", \"model training\",\n    \"data pipeline\", \"ml pipeline\", \"ml model\",\n    \"classification\", \"clustering\", \"regression\",\n    \"prediction\", \"recommendation\",\n    \"api\", \"microservice\", \"backend system\",\n    \"python\", \"pytorch\", \"tensorflow\",\n    \"distributed\", \"scalab\", \"high-throughput\",\n    \"benchmark\", \"metric\", \"evaluation\",\n]\n\nNEGATIVE_CAREER_KEYWORDS = [\n    \"marketing campaign\", \"brand identity\", \"seo strategy\",\n    \"content writing\", \"content marketing\", \"editorial\",\n    \"accounting\", \"financial reporting\", \"tax filing\",\n    \"general ledger\", \"audit\", \"gaap\", \"ind-as\",\n    \"sales cycle\", \"quota\", \"revenue target\", \"arr\",\n    \"customer support\", \"ticket\", \"escalation process\",\n    \"hr\", \"recruitment process\", \"talent acquisition team\",\n    \"mechanical engineering\", \"cad\", \"solidworks\", \"ansys\",\n    \"civil engineering\", \"construction\",\n    \"packaging design\", \"brand design\", \"creative direction\",\n    \"warehouses\", \"fulfillment\", \"logistics\",\n    \"slide-craft\", \"excel modeling\",\n]\n\n# ============================================================================\n# Behavioral signal thresholds\n# ============================================================================\nREFERENCE_DATE = date(2026, 6, 17)  # \"Current\" date for recency calculations\n\n# Last active date thresholds (days ago)\nACTIVE_VERY_RECENT_DAYS = 30    # Active within 30 days\nACTIVE_RECENT_DAYS = 90         # Active within 90 days\nACTIVE_STALE_DAYS = 180         # Inactive for 6+ months\n\n# Response rate thresholds\nRESPONSE_RATE_EXCELLENT = 0.7\nRESPONSE_RATE_GOOD = 0.5\nRESPONSE_RATE_POOR = 0.2\n\n# Response time thresholds (hours)\nRESPONSE_TIME_FAST = 24\nRESPONSE_TIME_OK = 72\nRESPONSE_TIME_SLOW = 120\n\n# Notice period thresholds (days)\nNOTICE_IDEAL = 30\nNOTICE_ACCEPTABLE = 60\nNOTICE_LONG = 90\nNOTICE_VERY_LONG = 120\n\n# ============================================================================\n# Honeypot detection thresholds\n# ============================================================================\nHONEYPOT_EXPERT_SKILL_COUNT = 8       # Suspicious if 8+ expert skills\nHONEYPOT_MIN_DURATION_FOR_EXPERT = 6  # Expert with <6 months = suspicious\nHONEYPOT_ZERO_DURATION_EXPERT = 3     # 3+ expert skills with 0 duration = honeypot\nHONEYPOT_ASSESSMENT_FAIL_THRESHOLD = 40  # Expert claiming but scores < 40\n\n# ============================================================================\n# Pre-filter thresholds\n# ============================================================================\nPREFILTER_MIN_EXPERIENCE = 1.0\nPREFILTER_MAX_EXPERIENCE = 25.0\n", "loader.py": "\"\"\"\nloader.py — Load candidate profiles from JSONL, JSON array, or gzipped variants.\n\nSupports:\n  - candidates.jsonl          (one JSON object per line)\n  - candidates.jsonl.gz       (gzipped JSONL)\n  - sample_candidates.json    (a JSON array [{}...])\n  - candidates.json.gz        (gzipped JSON array)\n\nUses streaming for JSONL to avoid loading the entire file into memory at once.\n\"\"\"\n\nimport gzip\nimport json\nimport sys\nfrom pathlib import Path\n\n\ndef load_candidates(filepath: str) -> list[dict]:\n    \"\"\"\n    Load all candidate profiles from a JSONL, JSON array, or gzipped variant.\n\n    Args:\n        filepath: Path to candidates file (.jsonl, .json, .jsonl.gz, .json.gz)\n\n    Returns:\n        List of candidate dictionaries.\n    \"\"\"\n    path = Path(filepath)\n\n    if not path.exists():\n        print(f\"Error: File not found: {filepath}\", file=sys.stderr)\n        sys.exit(1)\n\n    open_fn = gzip.open if path.suffix == \".gz\" else open\n    candidates = []\n\n    try:\n        with open_fn(path, \"rt\", encoding=\"utf-8\") as f:\n            # Peek at the first non-whitespace character to detect format\n            raw = f.read()\n\n        stripped = raw.lstrip()\n\n        if stripped.startswith(\"[\"):\n            # ── JSON array format: [{...}, {...}, ...] ────────────────────────\n            try:\n                candidates = json.loads(raw)\n                if not isinstance(candidates, list):\n                    raise ValueError(\"Top-level JSON is not a list\")\n            except (json.JSONDecodeError, ValueError) as e:\n                print(f\"Error parsing JSON array from {filepath}: {e}\", file=sys.stderr)\n                sys.exit(1)\n        else:\n            # ── JSONL format: one JSON object per line ────────────────────────\n            for line_num, line in enumerate(raw.splitlines(), 1):\n                line = line.strip()\n                if not line:\n                    continue\n                try:\n                    candidates.append(json.loads(line))\n                except json.JSONDecodeError as e:\n                    print(\n                        f\"Warning: Skipping malformed JSON at line {line_num}: {e}\",\n                        file=sys.stderr,\n                    )\n\n    except Exception as e:\n        print(f\"Error reading file {filepath}: {e}\", file=sys.stderr)\n        sys.exit(1)\n\n    print(f\"Loaded {len(candidates):,} candidates from {path.name}\")\n    return candidates\n\n\ndef load_candidate_ids(filepath: str) -> set[str]:\n    \"\"\"\n    Load just the candidate IDs from the file (for validation).\n\n    Args:\n        filepath: Path to candidates.jsonl or candidates.jsonl.gz\n\n    Returns:\n        Set of candidate_id strings.\n    \"\"\"\n    path = Path(filepath)\n    ids = set()\n    open_fn = gzip.open if path.suffix == \".gz\" else open\n\n    with open_fn(path, \"rt\", encoding=\"utf-8\") as f:\n        for line in f:\n            line = line.strip()\n            if not line:\n                continue\n            data = json.loads(line)\n            ids.add(data[\"candidate_id\"])\n\n    return ids\n", "prefilter.py": "\"\"\"\nprefilter.py — Stage 1: Fast pre-filtering to reduce candidate pool.\n\nEliminates obviously unfit candidates before detailed scoring.\nGoal: 100K candidates → ~5K-15K candidates for deeper analysis.\n\nThe pre-filter is intentionally generous to avoid false negatives.\nA candidate only gets eliminated if they are clearly not a fit\nacross MULTIPLE dimensions simultaneously.\n\"\"\"\n\nfrom config import (\n    PREFILTER_MIN_EXPERIENCE,\n    PREFILTER_MAX_EXPERIENCE,\n    TITLE_SCORES,\n    NON_TECH_SKILLS,\n    MUST_HAVE_SKILLS,\n    STRONG_WANT_SKILLS,\n    NICE_TO_HAVE_SKILLS,\n)\n\n\ndef _get_title_score(title: str) -> float:\n    \"\"\"Look up title score, trying exact match then fuzzy containment.\"\"\"\n    title_lower = title.lower().strip()\n\n    # Exact match\n    if title_lower in TITLE_SCORES:\n        return TITLE_SCORES[title_lower]\n\n    # Check if any known title is contained in the candidate's title\n    best_score = 0.0\n    for known_title, score in TITLE_SCORES.items():\n        if known_title in title_lower or title_lower in known_title:\n            best_score = max(best_score, score)\n\n    return best_score\n\n\ndef _has_any_relevant_skills(candidate: dict) -> bool:\n    \"\"\"Check if the candidate has ANY skill remotely related to tech/AI/ML.\"\"\"\n    all_relevant = MUST_HAVE_SKILLS | STRONG_WANT_SKILLS | NICE_TO_HAVE_SKILLS\n    skills = candidate.get(\"skills\", [])\n\n    for skill in skills:\n        skill_name = skill.get(\"name\", \"\").lower().strip()\n        for relevant in all_relevant:\n            if relevant in skill_name or skill_name in relevant:\n                return True\n\n    return False\n\n\ndef _has_technical_career_history(candidate: dict) -> bool:\n    \"\"\"\n    Check if any career history entry has a technical title,\n    even if the current title is non-technical.\n    \"\"\"\n    career = candidate.get(\"career_history\", [])\n    technical_keywords = [\n        \"engineer\", \"developer\", \"scientist\", \"architect\",\n        \"ml\", \"ai\", \"data\", \"software\", \"backend\", \"frontend\",\n        \"devops\", \"sre\", \"platform\", \"research\",\n    ]\n\n    for role in career:\n        role_title = role.get(\"title\", \"\").lower()\n        for kw in technical_keywords:\n            if kw in role_title:\n                return True\n\n    return False\n\n\ndef _count_non_tech_skills_ratio(candidate: dict) -> float:\n    \"\"\"\n    Compute the ratio of non-tech skills to total skills.\n    A high ratio suggests a non-technical candidate.\n    \"\"\"\n    skills = candidate.get(\"skills\", [])\n    if not skills:\n        return 0.0\n\n    non_tech_count = 0\n    for skill in skills:\n        skill_name = skill.get(\"name\", \"\").lower().strip()\n        if skill_name in NON_TECH_SKILLS:\n            non_tech_count += 1\n\n    return non_tech_count / len(skills)\n\n\ndef prefilter(candidates: list[dict]) -> list[dict]:\n    \"\"\"\n    Apply fast pre-filtering to eliminate obviously unfit candidates.\n\n    A candidate passes if they meet ANY of these criteria:\n    - Has a technical title (score > 0.1)\n    - Has relevant skills AND technical career history\n    - Has a good title score (> 0.3) regardless of other factors\n\n    A candidate is eliminated only if ALL of these are true:\n    - Title score is very low (< 0.05)\n    - No relevant technical skills\n    - No technical career history\n    - OR experience is way out of range\n\n    Returns:\n        Filtered list of candidates that passed pre-filtering.\n    \"\"\"\n    passed = []\n    eliminated = 0\n\n    for candidate in candidates:\n        profile = candidate.get(\"profile\", {})\n        current_title = profile.get(\"current_title\", \"\")\n        years_exp = profile.get(\"years_of_experience\", 0)\n\n        # --- Hard elimination: experience completely out of range ---\n        if years_exp < PREFILTER_MIN_EXPERIENCE or years_exp > PREFILTER_MAX_EXPERIENCE:\n            eliminated += 1\n            continue\n\n        # --- Title-based fast pass ---\n        title_score = _get_title_score(current_title)\n\n        # Strong titles pass immediately\n        if title_score >= 0.30:\n            passed.append(candidate)\n            continue\n\n        # --- For weak titles, check other signals ---\n        has_skills = _has_any_relevant_skills(candidate)\n        has_tech_career = _has_technical_career_history(candidate)\n        non_tech_ratio = _count_non_tech_skills_ratio(candidate)\n\n        # Pass if they have relevant skills OR a technical career history\n        if has_skills or has_tech_career:\n            passed.append(candidate)\n            continue\n\n        # Pass if title score is at least moderate (e.g., business analyst\n        # who might have technical depth)\n        if title_score >= 0.05:\n            passed.append(candidate)\n            continue\n\n        # Eliminate: non-technical title + no relevant skills + no tech career\n        eliminated += 1\n\n    print(f\"Pre-filter: {len(candidates):,} -> {len(passed):,} \"\n          f\"(eliminated {eliminated:,})\")\n    return passed\n", "honeypot.py": "\"\"\"\nhoneypot.py — Stage 3: Honeypot candidate detection.\n\nIdentifies ~80 candidates with subtly impossible profiles.\nSubmissions with >10% honeypots in top 100 are DISQUALIFIED.\n\nDetection signals:\n1. Salary min > max\n2. Expert proficiency in many skills with 0 or tiny duration\n3. Skill assessment score contradicts claimed proficiency\n4. Impossible date arithmetic\n5. Massive skill count with all expert/advanced but no career backing\n\"\"\"\n\nfrom datetime import datetime\nfrom config import (\n    HONEYPOT_EXPERT_SKILL_COUNT,\n    HONEYPOT_MIN_DURATION_FOR_EXPERT,\n    HONEYPOT_ZERO_DURATION_EXPERT,\n    HONEYPOT_ASSESSMENT_FAIL_THRESHOLD,\n)\n\n\ndef _check_salary_inversion(candidate: dict) -> bool:\n    \"\"\"Check if salary min > max (impossible).\"\"\"\n    signals = candidate.get(\"redrob_signals\", {})\n    salary = signals.get(\"expected_salary_range_inr_lpa\", {})\n    sal_min = salary.get(\"min\", 0)\n    sal_max = salary.get(\"max\", 0)\n\n    if sal_min > 0 and sal_max > 0 and sal_min > sal_max:\n        return True\n    return False\n\n\ndef _check_expert_skill_inflation(candidate: dict) -> tuple[bool, int]:\n    \"\"\"\n    Check for suspicious expert/advanced skill claims:\n    - Too many expert-level skills\n    - Expert skills with 0 or very short duration\n    \"\"\"\n    skills = candidate.get(\"skills\", [])\n\n    expert_advanced_count = 0\n    zero_duration_expert = 0\n    low_duration_expert = 0\n\n    for skill in skills:\n        prof = skill.get(\"proficiency\", \"\").lower()\n        duration = skill.get(\"duration_months\", 0)\n\n        if prof in (\"expert\", \"advanced\"):\n            expert_advanced_count += 1\n            if duration == 0:\n                zero_duration_expert += 1\n            elif duration < HONEYPOT_MIN_DURATION_FOR_EXPERT:\n                low_duration_expert += 1\n\n    # Flag 1: Too many expert/advanced skills with zero duration\n    if zero_duration_expert >= HONEYPOT_ZERO_DURATION_EXPERT:\n        return True, expert_advanced_count\n\n    # Flag 2: Absurdly many expert-level skills\n    if expert_advanced_count >= HONEYPOT_EXPERT_SKILL_COUNT and zero_duration_expert >= 2:\n        return True, expert_advanced_count\n\n    return False, expert_advanced_count\n\n\ndef _check_assessment_contradiction(candidate: dict) -> bool:\n    \"\"\"\n    Check if skill assessment scores contradict claimed proficiency.\n    E.g., claims 'expert' in Python but assessment score is 15.\n    \"\"\"\n    signals = candidate.get(\"redrob_signals\", {})\n    assessment_scores = signals.get(\"skill_assessment_scores\", {})\n    skills = candidate.get(\"skills\", [])\n\n    if not assessment_scores:\n        return False\n\n    contradictions = 0\n    for skill in skills:\n        skill_name = skill.get(\"name\", \"\")\n        prof = skill.get(\"proficiency\", \"\").lower()\n\n        if skill_name in assessment_scores and prof in (\"expert\", \"advanced\"):\n            score = assessment_scores[skill_name]\n            if score < HONEYPOT_ASSESSMENT_FAIL_THRESHOLD:\n                contradictions += 1\n\n    # Multiple contradictions = suspicious\n    return contradictions >= 2\n\n\ndef _check_impossible_dates(candidate: dict) -> bool:\n    \"\"\"\n    Check for impossible date configurations:\n    - Career start_date after end_date\n    - Duration doesn't match date range (large discrepancy)\n    - Dates in the far future\n    \"\"\"\n    career = candidate.get(\"career_history\", [])\n\n    for role in career:\n        start_str = role.get(\"start_date\", \"\")\n        end_str = role.get(\"end_date\")\n        duration = role.get(\"duration_months\", 0)\n\n        if not start_str:\n            continue\n\n        try:\n            start = datetime.strptime(start_str, \"%Y-%m-%d\")\n\n            if end_str:\n                end = datetime.strptime(end_str, \"%Y-%m-%d\")\n\n                # Start after end\n                if start > end:\n                    return True\n\n                # Duration wildly inconsistent with dates\n                actual_months = (end.year - start.year) * 12 + (end.month - start.month)\n                if abs(actual_months - duration) > 12:\n                    return True\n\n        except (ValueError, TypeError):\n            continue\n\n    return False\n\n\ndef _check_title_skills_extreme_mismatch(candidate: dict) -> bool:\n    \"\"\"\n    Check for extreme title-skills mismatch that suggests a honeypot:\n    - Non-technical title (Marketing Manager, Accountant) with 10+ advanced AI skills\n    - This is different from keyword stuffers (who are traps but not honeypots)\n    \"\"\"\n    profile = candidate.get(\"profile\", {})\n    title = profile.get(\"current_title\", \"\").lower()\n    skills = candidate.get(\"skills\", [])\n\n    non_tech_titles = {\n        \"marketing manager\", \"hr manager\", \"accountant\",\n        \"sales executive\", \"customer support\", \"content writer\",\n        \"graphic designer\", \"operations manager\",\n    }\n\n    if title not in non_tech_titles:\n        return False\n\n    # Count advanced/expert AI-specific skills\n    ai_skill_keywords = {\n        \"nlp\", \"deep learning\", \"machine learning\", \"pytorch\", \"tensorflow\",\n        \"transformers\", \"bert\", \"gpt\", \"llm\", \"rag\", \"embeddings\",\n        \"fine-tuning\", \"lora\", \"qlora\", \"neural\", \"reinforcement learning\",\n    }\n\n    expert_ai_count = 0\n    for skill in skills:\n        name = skill.get(\"name\", \"\").lower()\n        prof = skill.get(\"proficiency\", \"\").lower()\n        if prof in (\"expert\", \"advanced\"):\n            for kw in ai_skill_keywords:\n                if kw in name:\n                    expert_ai_count += 1\n                    break\n\n    # Non-tech title with 5+ expert AI skills and all 0 endorsements\n    # is suspicious even beyond normal keyword stuffing\n    return expert_ai_count >= 5\n\n\ndef _check_signup_after_last_active(candidate: dict) -> bool:\n    \"\"\"Check if signup date is after last active date (impossible).\"\"\"\n    signals = candidate.get(\"redrob_signals\", {})\n    signup = signals.get(\"signup_date\", \"\")\n    last_active = signals.get(\"last_active_date\", \"\")\n\n    if not signup or not last_active:\n        return False\n\n    try:\n        s = datetime.strptime(signup, \"%Y-%m-%d\")\n        la = datetime.strptime(last_active, \"%Y-%m-%d\")\n        # Signup significantly after last active = suspicious\n        if s > la and (s - la).days > 30:\n            return True\n    except (ValueError, TypeError):\n        pass\n\n    return False\n\n\ndef detect_honeypots(candidates: list[dict]) -> dict[str, list[str]]:\n    \"\"\"\n    Scan all candidates for honeypot indicators.\n\n    Returns:\n        Dictionary mapping candidate_id to list of reasons they were flagged.\n        Only candidates with at least one flag are included.\n    \"\"\"\n    flagged = {}\n\n    for candidate in candidates:\n        cid = candidate.get(\"candidate_id\", \"\")\n        reasons = []\n\n        # Check 1: Salary inversion\n        if _check_salary_inversion(candidate):\n            reasons.append(\"salary_min_gt_max\")\n\n        # Check 2: Expert skill inflation\n        is_inflated, expert_count = _check_expert_skill_inflation(candidate)\n        if is_inflated:\n            reasons.append(f\"expert_skill_inflation({expert_count}_expert_skills)\")\n\n        # Check 3: Assessment score contradictions\n        if _check_assessment_contradiction(candidate):\n            reasons.append(\"assessment_contradicts_proficiency\")\n\n        # Check 4: Impossible dates\n        if _check_impossible_dates(candidate):\n            reasons.append(\"impossible_dates\")\n\n        # Check 5: Extreme title-skills mismatch (beyond normal stuffing)\n        if _check_title_skills_extreme_mismatch(candidate):\n            reasons.append(\"extreme_title_skills_mismatch\")\n\n        # Check 6: Signup after last active\n        if _check_signup_after_last_active(candidate):\n            reasons.append(\"signup_after_last_active\")\n\n        # A candidate is flagged as honeypot if they have 2+ independent signals\n        # OR one very strong signal (salary inversion, impossible dates)\n        strong_signals = {\"salary_min_gt_max\", \"impossible_dates\"}\n        has_strong = any(r in strong_signals for r in reasons)\n\n        if len(reasons) >= 2 or has_strong:\n            flagged[cid] = reasons\n\n    print(f\"Honeypot detection: flagged {len(flagged)} candidates\")\n    return flagged\n", "scorer.py": "\"\"\"\nscorer.py — Stage 2: Multi-dimensional candidate scoring engine.\n\nComputes a base score (0-1) for each candidate across six dimensions:\n1. Title & Career Trajectory (30%)\n2. Skills Match with trust weighting (25%)\n3. Career Description Analysis (15%)\n4. Experience Band Fit (15%)\n5. Location Proximity (10%)\n6. Education (5%)\n\nThe scoring is designed to reward genuine AI/ML engineers with\nproduction experience, NOT keyword stuffers with inflated skill lists.\n\"\"\"\n\nimport config\nfrom config import (\n    TITLE_SCORES,\n    MUST_HAVE_SKILLS,\n    STRONG_WANT_SKILLS,\n    NICE_TO_HAVE_SKILLS,\n    SKILL_CATEGORY_POINTS,\n    NON_TECH_SKILLS,\n    CONSULTING_FIRMS,\n    PRODUCT_COMPANIES,\n    LOCATION_TIER_SCORES,\n    INDIA_OTHER_RELOCATE,\n    INDIA_OTHER_NO_RELOCATE,\n    OUTSIDE_INDIA_RELOCATE,\n    OUTSIDE_INDIA_NO_RELOCATE,\n    INDIA_COUNTRY,\n    EXPERIENCE_IDEAL_MIN,\n    EXPERIENCE_IDEAL_MAX,\n    EXPERIENCE_ACCEPTABLE_MIN,\n    EXPERIENCE_ACCEPTABLE_MAX,\n    EXPERIENCE_HARD_MIN,\n    EXPERIENCE_HARD_MAX,\n    STRONG_POSITIVE_KEYWORDS,\n    MODERATE_POSITIVE_KEYWORDS,\n    NEGATIVE_CAREER_KEYWORDS,\n)\n\n\n# ============================================================================\n# Dimension 1: Title & Career Trajectory (30%)\n# ============================================================================\n\ndef _score_title(title: str) -> float:\n    \"\"\"Score the candidate's current title against the JD.\"\"\"\n    title_lower = title.lower().strip()\n\n    # Exact match\n    if title_lower in TITLE_SCORES:\n        return TITLE_SCORES[title_lower]\n\n    # Containment match (e.g., \"Senior AI/ML Engineer\" contains \"ai engineer\")\n    best = 0.0\n    for known, score in TITLE_SCORES.items():\n        if known in title_lower or title_lower in known:\n            best = max(best, score)\n\n    # Partial keyword match for titles not in our map\n    if best == 0.0:\n        title_words = set(title_lower.split())\n        tech_words = {\"engineer\", \"developer\", \"scientist\", \"architect\", \"researcher\"}\n        ai_words = {\"ai\", \"ml\", \"machine\", \"learning\", \"data\", \"nlp\", \"deep\"}\n        if title_words & tech_words:\n            best = 0.35\n            if title_words & ai_words:\n                best = 0.60\n        else:\n            best = 0.05\n\n    return best\n\n\ndef _score_career_trajectory(candidate: dict) -> float:\n    \"\"\"\n    Analyze the career trajectory:\n    - Company types (product vs consulting)\n    - Title progression\n    - Career stability (avg tenure)\n    - Industry relevance\n    \"\"\"\n    career = candidate.get(\"career_history\", [])\n    if not career:\n        return 0.1\n\n    scores = []\n    total_months = 0\n    consulting_months = 0\n    product_months = 0\n    tech_roles = 0\n\n    for role in career:\n        company = role.get(\"company\", \"\").lower()\n        title = role.get(\"title\", \"\").lower()\n        duration = role.get(\"duration_months\", 0)\n        industry = role.get(\"industry\", \"\").lower()\n\n        total_months += duration\n\n        # Check company type\n        is_consulting = any(cf in company for cf in CONSULTING_FIRMS)\n        is_product = any(pc in company for pc in PRODUCT_COMPANIES)\n\n        if is_consulting:\n            consulting_months += duration\n        if is_product:\n            product_months += duration\n\n        # Check if this is a technical role\n        role_score = _score_title(title)\n        if role_score >= 0.30:\n            tech_roles += 1\n\n        scores.append(role_score)\n\n    # Career trajectory score components\n    trajectory_score = 0.0\n\n    # 1. Average technical level of roles (weight: 40% of trajectory)\n    avg_title_score = sum(scores) / len(scores) if scores else 0\n    trajectory_score += 0.4 * avg_title_score\n\n    # 2. Best role (weight: 30% — rewards anyone who's held a strong role)\n    best_title_score = max(scores) if scores else 0\n    trajectory_score += 0.3 * best_title_score\n\n    # 3. Company type (weight: 20%)\n    if total_months > 0:\n        consulting_ratio = consulting_months / total_months\n        product_ratio = product_months / total_months\n\n        # JD explicitly flags entire-career-at-consulting\n        if consulting_ratio >= 0.95:\n            company_score = 0.1  # Strong penalty\n        elif consulting_ratio >= 0.7:\n            company_score = 0.3\n        elif product_ratio >= 0.5:\n            company_score = 0.9  # Product company bonus\n        else:\n            company_score = 0.5  # Mixed — neutral\n    else:\n        company_score = 0.3\n\n    trajectory_score += 0.2 * company_score\n\n    # 4. Career stability (weight: 10%)\n    num_roles = len(career)\n    total_years = total_months / 12 if total_months > 0 else 1\n    avg_tenure_years = total_years / num_roles if num_roles > 0 else 0\n\n    if avg_tenure_years >= 3.0:\n        stability = 1.0  # Very stable\n    elif avg_tenure_years >= 2.0:\n        stability = 0.8\n    elif avg_tenure_years >= 1.5:\n        stability = 0.5  # JD warns about 1.5-year hoppers\n    else:\n        stability = 0.2  # Title-chaser pattern\n\n    trajectory_score += 0.1 * stability\n\n    return min(1.0, trajectory_score)\n\n\ndef score_title_career(candidate: dict) -> float:\n    \"\"\"Combined title + career trajectory score.\"\"\"\n    profile = candidate.get(\"profile\", {})\n    current_title = profile.get(\"current_title\", \"\")\n\n    title_score = _score_title(current_title)\n    trajectory_score = _score_career_trajectory(candidate)\n\n    # Weighted combination: current title matters more\n    return 0.55 * title_score + 0.45 * trajectory_score\n\n\n# ============================================================================\n# Dimension 2: Skills Match (25%)\n# ============================================================================\n\ndef _skill_trust_weight(skill: dict) -> float:\n    \"\"\"\n    Compute a trust weight for a single skill based on:\n    - proficiency level\n    - duration_months (how long they've used it)\n    - endorsements (social validation)\n\n    Returns a value 0.0 to 1.0 representing how much we trust this claim.\n    \"\"\"\n    proficiency_map = {\n        \"expert\": 1.0,\n        \"advanced\": 0.75,\n        \"intermediate\": 0.50,\n        \"beginner\": 0.25,\n    }\n\n    prof = skill.get(\"proficiency\", \"beginner\").lower()\n    duration = skill.get(\"duration_months\", 0)\n    endorsements = skill.get(\"endorsements\", 0)\n\n    prof_score = proficiency_map.get(prof, 0.25)\n\n    # Duration trust: 0-6 months = low, 6-24 = medium, 24+ = high\n    if duration >= 24:\n        duration_trust = 1.0\n    elif duration >= 12:\n        duration_trust = 0.7\n    elif duration >= 6:\n        duration_trust = 0.4\n    else:\n        duration_trust = 0.15\n\n    # Endorsement trust: logarithmic scale\n    if endorsements >= 20:\n        endorse_trust = 1.0\n    elif endorsements >= 10:\n        endorse_trust = 0.7\n    elif endorsements >= 3:\n        endorse_trust = 0.4\n    else:\n        endorse_trust = 0.15\n\n    # Combined trust = weighted average\n    trust = 0.4 * prof_score + 0.35 * duration_trust + 0.25 * endorse_trust\n\n    # Penalty: Expert/Advanced with 0 duration = suspicious\n    if prof in (\"expert\", \"advanced\") and duration == 0:\n        trust *= 0.2\n\n    # Penalty: Expert with 0 endorsements and < 6 months\n    if prof == \"expert\" and endorsements == 0 and duration < 6:\n        trust *= 0.1\n\n    return trust\n\n\ndef _match_skill_to_category(skill_name: str) -> tuple[str, float]:\n    \"\"\"\n    Match a skill name to our taxonomy categories.\n    Returns (category, base_points).\n    \"\"\"\n    name_lower = skill_name.lower().strip()\n\n    # Check must-have\n    for s in MUST_HAVE_SKILLS:\n        if s in name_lower or name_lower in s:\n            return \"must_have\", SKILL_CATEGORY_POINTS[\"must_have\"]\n\n    # Check strong-want\n    for s in STRONG_WANT_SKILLS:\n        if s in name_lower or name_lower in s:\n            return \"strong_want\", SKILL_CATEGORY_POINTS[\"strong_want\"]\n\n    # Check nice-to-have\n    for s in NICE_TO_HAVE_SKILLS:\n        if s in name_lower or name_lower in s:\n            return \"nice_to_have\", SKILL_CATEGORY_POINTS[\"nice_to_have\"]\n\n    return \"other\", 0.0\n\n\ndef score_skills(candidate: dict) -> float:\n    \"\"\"\n    Score skill-JD alignment with trust weighting.\n\n    The system rewards:\n    - Must-have skills with high trust (long duration, endorsements)\n    - Breadth across skill categories\n    - Skills backed by career history\n\n    The system penalizes:\n    - Keyword stuffing (many expert skills, low trust)\n    - Skills that don't match career history\n    \"\"\"\n    skills = candidate.get(\"skills\", [])\n\n    if not skills:\n        return 0.0\n\n    total_weighted_points = 0.0\n    must_have_count = 0\n    strong_want_count = 0\n    nice_to_have_count = 0\n    non_tech_count = 0\n    matched_categories = set()\n\n    for skill in skills:\n        skill_name = skill.get(\"name\", \"\")\n        name_lower = skill_name.lower().strip()\n\n        # Check if it's a non-tech skill\n        if name_lower in NON_TECH_SKILLS:\n            non_tech_count += 1\n            continue\n\n        category, base_points = _match_skill_to_category(skill_name)\n        if base_points == 0:\n            continue\n\n        trust = _skill_trust_weight(skill)\n        weighted = base_points * trust\n\n        total_weighted_points += weighted\n        matched_categories.add(category)\n\n        if category == \"must_have\":\n            must_have_count += 1\n        elif category == \"strong_want\":\n            strong_want_count += 1\n        elif category == \"nice_to_have\":\n            nice_to_have_count += 1\n\n    # Normalize score\n    # Max theoretical: 5 must-haves × 5.0 × 1.0 = 25, but realistic max ~15\n    raw_score = total_weighted_points / 18.0\n\n    # Bonus for breadth (having skills across multiple categories)\n    if len(matched_categories) >= 3:\n        raw_score *= 1.15\n    elif len(matched_categories) >= 2:\n        raw_score *= 1.05\n\n    # Bonus for must-have coverage (most important)\n    if must_have_count >= 3:\n        raw_score *= 1.20\n    elif must_have_count >= 2:\n        raw_score *= 1.10\n\n    # Penalty for high non-tech ratio (suggests non-technical background)\n    total_skills = len(skills)\n    if total_skills > 0:\n        non_tech_ratio = non_tech_count / total_skills\n        if non_tech_ratio > 0.6:\n            raw_score *= 0.3\n        elif non_tech_ratio > 0.4:\n            raw_score *= 0.6\n\n    return min(1.0, raw_score)\n\n\n# ============================================================================\n# Dimension 3: Career Description Analysis (15%)\n# ============================================================================\n\ndef score_career_descriptions(candidate: dict) -> float:\n    \"\"\"\n    Analyze career history descriptions for relevant keywords.\n\n    NOTE: The dataset uses recycled description templates, so this\n    dimension has intentionally lower weight. We use it as supplementary\n    signal, not primary.\n    \"\"\"\n    career = candidate.get(\"career_history\", [])\n\n    if not career:\n        return 0.0\n\n    # Also include the profile summary\n    profile = candidate.get(\"profile\", {})\n    summary = profile.get(\"summary\", \"\").lower()\n\n    strong_hits = 0\n    moderate_hits = 0\n    negative_hits = 0\n\n    texts = [summary]\n    for role in career:\n        desc = role.get(\"description\", \"\").lower()\n        texts.append(desc)\n\n    combined_text = \" \".join(texts)\n\n    for keyword in STRONG_POSITIVE_KEYWORDS:\n        if keyword in combined_text:\n            strong_hits += 1\n\n    for keyword in MODERATE_POSITIVE_KEYWORDS:\n        if keyword in combined_text:\n            moderate_hits += 1\n\n    for keyword in NEGATIVE_CAREER_KEYWORDS:\n        if keyword in combined_text:\n            negative_hits += 1\n\n    # Score: positive keywords add, negative keywords subtract\n    raw = (strong_hits * 3.0 + moderate_hits * 1.0 - negative_hits * 1.5)\n\n    # Normalize: theoretical max around 20-30 strong + moderate hits\n    normalized = raw / 15.0\n\n    # Clamp to [0, 1]\n    return max(0.0, min(1.0, normalized))\n\n\n# ============================================================================\n# Dimension 4: Experience Band Fit (15%)\n# ============================================================================\n\ndef score_experience(candidate: dict) -> float:\n    \"\"\"\n    Score based on years of experience.\n    JD says 5-9 years ideal, flexible for strong candidates.\n    \"\"\"\n    profile = candidate.get(\"profile\", {})\n    years = profile.get(\"years_of_experience\", 0)\n\n    if EXPERIENCE_IDEAL_MIN <= years <= EXPERIENCE_IDEAL_MAX:\n        return 1.0\n    elif years < EXPERIENCE_IDEAL_MIN:\n        # Below ideal range\n        if years >= EXPERIENCE_ACCEPTABLE_MIN:\n            # 3-5 years: linearly ramp from 0.5 to 1.0\n            return 0.5 + 0.5 * (years - EXPERIENCE_ACCEPTABLE_MIN) / \\\n                   (EXPERIENCE_IDEAL_MIN - EXPERIENCE_ACCEPTABLE_MIN)\n        elif years >= EXPERIENCE_HARD_MIN:\n            # 1.5-3 years: low score\n            return 0.2 + 0.3 * (years - EXPERIENCE_HARD_MIN) / \\\n                   (EXPERIENCE_ACCEPTABLE_MIN - EXPERIENCE_HARD_MIN)\n        else:\n            return 0.05\n    else:\n        # Above ideal range\n        if years <= EXPERIENCE_ACCEPTABLE_MAX:\n            # 9-14 years: gentle decline\n            return 1.0 - 0.4 * (years - EXPERIENCE_IDEAL_MAX) / \\\n                   (EXPERIENCE_ACCEPTABLE_MAX - EXPERIENCE_IDEAL_MAX)\n        elif years <= EXPERIENCE_HARD_MAX:\n            # 14-20 years: steeper decline (JD says \"this role writes code\")\n            return 0.3 - 0.2 * (years - EXPERIENCE_ACCEPTABLE_MAX) / \\\n                   (EXPERIENCE_HARD_MAX - EXPERIENCE_ACCEPTABLE_MAX)\n        else:\n            return 0.05\n\n\n# ============================================================================\n# Dimension 5: Location (10%)\n# ============================================================================\n\ndef score_location(candidate: dict) -> float:\n    \"\"\"\n    Score based on geographic fit.\n    JD: Pune/Noida preferred, Tier-1 Indian cities welcome,\n    outside India case-by-case.\n    \"\"\"\n    profile = candidate.get(\"profile\", {})\n    signals = candidate.get(\"redrob_signals\", {})\n\n    location = profile.get(\"location\", \"\").lower().strip()\n    country = profile.get(\"country\", \"\").lower().strip()\n    willing_to_relocate = signals.get(\"willing_to_relocate\", False)\n\n    # Check if location matches any known city\n    for city, score in LOCATION_TIER_SCORES.items():\n        if city in location:\n            return score\n\n    # Didn't match a known city — check country\n    if country == INDIA_COUNTRY or \"india\" in location:\n        if willing_to_relocate:\n            return INDIA_OTHER_RELOCATE\n        else:\n            return INDIA_OTHER_NO_RELOCATE\n\n    # Outside India\n    if willing_to_relocate:\n        return OUTSIDE_INDIA_RELOCATE\n    else:\n        return OUTSIDE_INDIA_NO_RELOCATE\n\n\n# ============================================================================\n# Di
